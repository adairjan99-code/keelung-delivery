<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%23000000'/%3E%3Ctext x='256' y='370' font-family='Arial Black,sans-serif' font-size='340' font-weight='900' fill='%23FFFFFF' text-anchor='middle'%3EU%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%23000000'/%3E%3Ctext x='256' y='370' font-family='Arial Black,sans-serif' font-size='340' font-weight='900' fill='%23FFFFFF' text-anchor='middle'%3EU%3C/text%3E%3C/svg%3E">
<title>基隆外送策略</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=JetBrains+Mono:wght@500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0F0F0F;color:#F0F0F0;font-family:'Noto Sans TC',sans-serif;min-height:100vh;padding:28px 16px 56px;display:flex;justify-content:center}
.card{width:100%;max-width:380px}
.top{margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #1E1E1E}
.top-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;color:#444;margin-bottom:8px}
.top-title{font-size:26px;font-weight:900;line-height:1.1;margin-bottom:6px}
.top-sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:#444}
.wife-note{margin-bottom:18px;padding:11px 14px;background:linear-gradient(135deg,rgba(110,231,183,0.07) 0%,rgba(167,139,250,0.07) 100%);border:1px solid #1E1E1E;border-left:3px solid #6EE7B7;border-radius:4px;position:relative;}
.wife-tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:#6EE7B7;opacity:0.7;margin-bottom:5px}
.wife-text{font-size:13px;line-height:1.7;color:#D4FAE8;font-weight:700}
.wife-sig{font-family:'JetBrains Mono',monospace;font-size:9px;color:#444;margin-top:5px;text-align:right}
.date-picker{margin-bottom:18px;display:flex;align-items:center;gap:8px;background:#141414;border:1px solid #1E1E1E;border-radius:6px;padding:10px 12px;}
.date-picker label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:#444;flex-shrink:0}
.date-picker input[type="date"]{flex:1;background:transparent;border:none;color:#DEDEDE;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;outline:none;cursor:pointer;-webkit-appearance:none;}
.date-picker input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.4);cursor:pointer}
.date-go-btn{padding:5px 10px;background:#1A2A1A;border:1px solid rgba(110,231,183,0.2);border-radius:3px;color:#6EE7B7;font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:1px;flex-shrink:0;white-space:nowrap;}
.date-go-btn:hover{background:#1F3A1F;border-color:rgba(110,231,183,0.4)}
.date-today-btn{padding:5px 8px;background:#141414;border:1px solid #222;border-radius:3px;color:#444;font-family:'JetBrains Mono',monospace;font-size:9px;cursor:pointer;flex-shrink:0;}
.date-today-btn:hover{color:#666;border-color:#333}
.loading-screen{padding:48px 0;text-align:center}
.loading-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;color:#2A2A2A;margin-bottom:20px}
.loading-bar-wrap{width:100%;height:1px;background:#1A1A1A;margin-bottom:14px}
.loading-bar{height:100%;width:0%;background:#6EE7B7;transition:width 0.6s ease}
.loading-status{font-family:'JetBrains Mono',monospace;font-size:11px;color:#2A2A2A}
.error-box{background:#1A0A0A;border:1px solid #3A1A1A;border-left:3px solid #F87171;border-radius:4px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#F87171;line-height:1.6;margin-bottom:12px}
.retry-btn{width:100%;margin-top:10px;padding:9px;background:#1A0A0A;border:1px solid #3A1A1A;border-radius:4px;color:#F87171;font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:1px}
.weather-bar{background:#161616;border:1px solid #222;border-radius:6px;padding:10px 12px;display:grid;grid-template-columns:1fr 1fr 1fr;margin-bottom:18px}
.w-item{text-align:center}
.w-item+.w-item{border-left:1px solid #222}
.w-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:#60A5FA;margin-bottom:2px}
.w-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:#444;letter-spacing:1px}
.alert{background:#1A0F0F;border:1px solid #4A1E1E;border-left:3px solid #F87171;border-radius:4px;padding:10px 12px;margin-bottom:18px;font-size:12px;font-family:'JetBrains Mono',monospace;color:#F87171;line-height:1.6}
.alert-title{font-weight:700;font-size:10px;letter-spacing:2px;margin-bottom:4px;opacity:0.7}
.block{padding:16px 0;border-bottom:1px solid #1E1E1E}
.time-row{display:flex;align-items:baseline;gap:8px;margin-bottom:12px}
.time-emoji{font-size:15px;flex-shrink:0}
.time-range{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700}
.time-name{font-family:'JetBrains Mono',monospace;font-size:11px;color:#444;margin-left:6px}
.cond-tag{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;border-radius:2px;letter-spacing:1px;margin-left:auto;flex-shrink:0}
.tag-rain{background:rgba(96,165,250,0.12);color:#60A5FA;border:1px solid rgba(96,165,250,0.2)}
.tag-wind{background:rgba(248,113,113,0.12);color:#F87171;border:1px solid rgba(248,113,113,0.2)}
.tag-cloud{background:rgba(156,163,175,0.12);color:#9CA3AF;border:1px solid rgba(156,163,175,0.2)}
.tag-ok{background:rgba(52,211,153,0.10);color:#6EE7B7;border:1px solid rgba(52,211,153,0.2)}
.tag-sun{background:rgba(253,224,71,0.10);color:#FDE047;border:1px solid rgba(253,224,71,0.2)}
.price-line{display:flex;align-items:baseline;margin-bottom:5px;padding-left:23px}
.price-type{font-family:'JetBrains Mono',monospace;font-size:12px;color:#555;width:28px;flex-shrink:0}
.price-gte{font-family:'JetBrains Mono',monospace;font-size:12px;color:#333;width:16px;flex-shrink:0}
.price-val{font-size:30px;font-weight:900;line-height:1;letter-spacing:-1px}
.price-unit{font-family:'JetBrains Mono',monospace;font-size:10px;color:#444;margin-left:3px;padding-bottom:3px;align-self:flex-end}

.tip{padding-left:23px;margin-top:8px}
.tip-inner{padding:7px 10px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.6}
.tip-inner.red{background:#1A0A0A;color:#F87171;border-left:2px solid #7A2020}
.tip-inner.blue{background:#0A1020;color:#93C5FD;border-left:2px solid #1A3A7A}
.tip-inner.green{background:#0A1A10;color:#6EE7B7;border-left:2px solid #1A5A30}
.tip-inner.gray{background:#141414;color:#555;border-left:2px solid #2A2A2A}
.c-white{color:#DEDEDE}.c-blue{color:#60A5FA}.c-orange{color:#FB923C}
.c-red{color:#F87171}.c-purple{color:#A78BFA}
.nogo{margin-top:20px;border:1px solid #2A1A1A;border-radius:4px;overflow:hidden}
.nogo-head{background:#1A0A0A;padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;color:#F87171;opacity:0.8}
.nogo-item{padding:8px 12px;border-bottom:1px solid #1A1A1A;display:flex;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#444;line-height:1.5}
.nogo-item:last-child{border-bottom:none}
.nogo-x{color:#F87171;flex-shrink:0}
.today-note{margin-top:8px;padding:10px 12px;background:#111;border:1px solid #1E1E1E;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#333;line-height:1.7}
.today-note span{color:#555}
.regen-btn{width:100%;margin-top:20px;padding:11px;background:#141414;border:1px solid #1E1E1E;border-radius:4px;color:#333;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;cursor:pointer;text-align:center}
.regen-btn:hover{border-color:#444;color:#666}
.footer{margin-top:28px;font-family:'JetBrains Mono',monospace;font-size:9px;color:#1E1E1E;letter-spacing:2px;text-align:center}

/* ── 七天天氣圖 ── */
.week-chart{margin-bottom:18px;background:#111;border:1px solid #1E1E1E;border-radius:8px;overflow:hidden}
.week-chart-head{padding:8px 12px;background:#141414;border-bottom:1px solid #1E1E1E;display:flex;justify-content:space-between;align-items:center}
.week-chart-title{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;color:#444}
.week-chart-body{padding:12px 10px 8px}
.wc-bars{display:flex;gap:4px;align-items:flex-end;height:70px;margin-bottom:6px}
.wc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.wc-bar-wrap{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;flex:1}
.wc-bar-max{width:60%;border-radius:2px 2px 0 0;background:linear-gradient(180deg,#FB923C,#F59E0B);min-height:4px;transition:height 0.4s}
.wc-bar-min{width:60%;border-radius:0 0 2px 2px;background:linear-gradient(180deg,#3B82F6,#60A5FA);min-height:4px;transition:height 0.4s}
.wc-emoji{font-size:14px;line-height:1}
.wc-date{font-family:'JetBrains Mono',monospace;font-size:8px;color:#444;text-align:center;white-space:nowrap}
.wc-date.wc-today{color:#6EE7B7}
.wc-date.wc-selected{color:#A78BFA}
.wc-temp-row{display:flex;gap:4px;margin-top:4px}
.wc-t{font-family:'JetBrains Mono',monospace;font-size:9px;text-align:center;flex:1}
.wc-t.max{color:#FB923C}
.wc-t.min{color:#60A5FA}
.wc-pop-row{display:flex;gap:4px;margin-top:2px}
.wc-pop{font-family:'JetBrains Mono',monospace;font-size:8px;color:#444;text-align:center;flex:1}
.wc-pop.high{color:#60A5FA}
.wc-legend{display:flex;gap:12px;padding:6px 2px 0;border-top:1px solid #1A1A1A;margin-top:4px}
.wc-legend-item{display:flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:8px;color:#444}
.wc-legend-dot{width:8px;height:8px;border-radius:1px}

/* ── 存圖片 ── */
.save-box{margin-top:16px;background:#111;border:1px solid #1E1E1E;border-radius:6px;overflow:hidden}
.save-box-head{padding:9px 12px;background:#141414;border-bottom:1px solid #1E1E1E;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;color:#444}
.save-slots{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 12px}
.save-slot{padding:8px 6px;background:#0F0F0F;border:1px solid #1E1E1E;border-radius:4px;cursor:pointer;text-align:center;transition:border-color 0.15s,background 0.15s}
.save-slot:hover{background:#161616;border-color:#333}
.save-slot.active{background:#0A1A10;border-color:rgba(110,231,183,0.4)}
.save-slot-time{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:#555;margin-bottom:2px}
.save-slot.active .save-slot-time{color:#6EE7B7}
.save-slot-name{font-family:'JetBrains Mono',monospace;font-size:8px;color:#2A2A2A}
.save-slot.active .save-slot-name{color:#3A7A55}
.save-btn{display:block;width:calc(100% - 24px);margin:0 12px 12px;padding:10px;background:#1A2A1A;border:1px solid rgba(110,231,183,0.2);border-radius:4px;color:#6EE7B7;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;cursor:pointer;text-align:center}
.save-btn:hover{background:#1F3A1F;border-color:rgba(110,231,183,0.4)}
.save-btn:disabled{opacity:0.3;cursor:not-allowed}
/* ── 一週天氣條 ── */
.week-strip{margin-bottom:18px;background:#111;border:1px solid #1E1E1E;border-radius:8px;overflow:hidden}
.week-strip-head{padding:8px 12px;background:#141414;border-bottom:1px solid #1E1E1E;display:flex;justify-content:space-between;align-items:center}
.week-strip-title{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;color:#444}
.week-strip-updated{font-family:'JetBrains Mono',monospace;font-size:9px;color:#2A2A2A}
.week-days{display:flex;overflow-x:auto;gap:0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.week-days::-webkit-scrollbar{display:none}
.week-day{flex:0 0 calc(100%/7);min-width:48px;padding:10px 4px 10px;text-align:center;border-right:1px solid #1A1A1A;cursor:pointer;transition:background 0.15s;position:relative}
.week-day:last-child{border-right:none}
.week-day:active,.week-day.active{background:#1A2A1A}
.week-day.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:#6EE7B7}
.week-day-name{font-family:'JetBrains Mono',monospace;font-size:9px;color:#444;margin-bottom:4px}
.week-day-name.today-mark{color:#6EE7B7}
.week-day-emoji{font-size:18px;line-height:1;margin-bottom:4px}
.week-day-max{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:#FB923C}
.week-day-min{font-family:'JetBrains Mono',monospace;font-size:10px;color:#60A5FA}
.week-day-pop{font-family:'JetBrains Mono',monospace;font-size:9px;color:#444;margin-top:2px}
/* 即時觀測條 */
.live-bar{background:#0A1A0A;border:1px solid rgba(110,231,183,0.15);border-radius:6px;padding:10px 12px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:0}
.live-item{text-align:center}
.live-item+.live-item{border-left:1px solid #1A2A1A}
.live-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:#6EE7B7;margin-bottom:2px}
.live-label{font-family:'JetBrains Mono',monospace;font-size:8px;color:#3A5A3A;letter-spacing:1px}
.live-time{font-family:'JetBrains Mono',monospace;font-size:9px;color:#2A4A2A;text-align:right;margin-top:4px;padding-right:4px}
/* ── 24小時雨量圖 ── */
.rain-chart{background:#0A1020;border:1px solid rgba(96,165,250,0.12);border-radius:6px;padding:10px 12px;margin-bottom:14px}
.rain-chart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.rain-chart-title{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:#3A5A7A}
.rain-chart-max{font-family:'JetBrains Mono',monospace;font-size:9px;color:#2A4A6A}
.rain-bars{display:flex;align-items:flex-end;gap:1px;height:48px}
.rain-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:48px;position:relative;cursor:default}
.rain-bar-fill{width:100%;border-radius:1px 1px 0 0;min-height:1px;transition:height 0.3s}
.rain-times{display:flex;margin-top:4px}
.rain-time-label{font-family:'JetBrains Mono',monospace;font-size:8px;color:#2A3A4A;text-align:center}



.today-dot{display:inline-block;width:6px;height:6px;background:#6EE7B7;border-radius:50%;margin-right:6px;vertical-align:middle;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.date-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;border-radius:2px;margin-left:8px;vertical-align:middle;}
.badge-past{background:rgba(156,163,175,0.12);color:#9CA3AF;border:1px solid rgba(156,163,175,0.2)}
.badge-future{background:rgba(167,139,250,0.12);color:#A78BFA;border:1px solid rgba(167,139,250,0.2)}
.badge-today{background:rgba(110,231,183,0.12);color:#6EE7B7;border:1px solid rgba(110,231,183,0.2)}











</style>
</head>
<body>

<div class="card">
  <div class="top">
    <div class="top-label">KEELUNG · 機車外送</div>
    <div class="top-title" id="topTitle">基隆外送<br>每日策略</div>
    <div class="top-sub">09:00–21:00 · 目標 ＄1500–2000／日</div>
  </div>

  <!-- 老婆加油語錄 -->
  <div class="wife-note">
    <div class="wife-tag">💌 老婆說</div>
    <div class="wife-text" id="wifeQuote">載入中...</div>
    <div class="wife-sig">— 老婆 ♡</div>
  </div>

  <!-- 基隆局部雷達 -->
  <div id="radarCard" style="margin-bottom:18px;background:#0A1020;border:1px solid rgba(96,165,250,0.15);border-radius:8px;overflow:hidden">
    <div style="padding:8px 12px;background:#0D1525;border-bottom:1px solid rgba(96,165,250,0.12);display:flex;justify-content:space-between;align-items:center">
      <span style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;color:#3A5A7A">🛰 基隆局部雷達</span>
      <span id="radarStatus" style="font-family:'JetBrains Mono',monospace;font-size:9px;color:#2A4A6A">載入中...</span>
    </div>
    <div style="position:relative;width:100%;height:240px;overflow:hidden">
      <iframe
        id="radarFrame"
        src="https://embed.windy.com/embed2.html?lat=25.13&lon=121.74&detailLat=25.13&detailLon=121.74&width=380&height=240&zoom=9&level=surface&overlay=radar&product=radar&menu=&message=&marker=&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=default&metricTemp=%C2%B0C&radarRange=-1"
        style="width:100%;height:240px;border:none;display:block"
        allowfullscreen
        loading="lazy"
        onload="document.getElementById('radarStatus').textContent='即時更新中'"
        onerror="document.getElementById('radarStatus').textContent='⚠ 載入失敗'"
      ></iframe>
      <div style="position:absolute;top:8px;left:8px;background:rgba(10,16,32,0.85);border:1px solid rgba(96,165,250,0.3);border-radius:4px;padding:4px 8px;pointer-events:none">
        <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#60A5FA;font-weight:700">📍 基隆市</span>
      </div>
    </div>
    <div style="padding:8px 12px;display:flex;align-items:center;gap:8px;border-top:1px solid rgba(96,165,250,0.08)">
      <div id="radarDot" style="width:8px;height:8px;border-radius:50%;background:#2A3A5A;flex-shrink:0;animation:blink 1.5s infinite"></div>
      <div>
        <div id="radarApproach" style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#3A5A7A">正在分析雨雲位置...</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:#1A2A3A;margin-top:2px">Windy / ECMWF · 每10分鐘更新</div>
      </div>
      <button onclick="checkRadarRain()" style="margin-left:auto;padding:4px 8px;background:#0D1525;border:1px solid rgba(96,165,250,0.2);border-radius:3px;color:#60A5FA;font-family:'JetBrains Mono',monospace;font-size:9px;cursor:pointer;flex-shrink:0">更新判斷</button>
    </div>
  </div>

  <!-- 一週天氣條 -->
  <div class="week-strip" id="weekStrip" style="display:none">
    <div class="week-strip-head">
      <span class="week-strip-title">7天預報</span>
      <span class="week-strip-updated" id="weekUpdated"></span>
    </div>
    <div class="week-days" id="weekDays"></div>
  </div>

  <div id="weekDebug" style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#444;padding:4px 0 2px;text-align:center"></div>
  <!-- 七天天氣圖 -->
  <div class="week-chart" id="weekChart" style="display:none">
    <div class="week-chart-head">
      <span class="week-chart-title">7天氣溫／降雨</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:#2A2A2A" id="weekChartSub"></span>
    </div>
    <div class="week-chart-body">
      <div class="wc-bars" id="wcBars"></div>
      <div class="wc-temp-row" id="wcTempRow"></div>
      <div class="wc-pop-row" id="wcPopRow"></div>
      <div id="wcDateRow" style="display:flex;gap:4px;margin-top:4px"></div>
      <div class="wc-legend">
        <div class="wc-legend-item"><div class="wc-legend-dot" style="background:#FB923C"></div>最高溫</div>
        <div class="wc-legend-item"><div class="wc-legend-dot" style="background:#60A5FA"></div>最低溫</div>
        <div class="wc-legend-item"><div class="wc-legend-dot" style="background:rgba(96,165,250,0.3)"></div>降雨機率</div>
      </div>

function getQuoteForDate(dateStr){
  let seed=0;
  for(let i=0;i<dateStr.length;i++) seed+=dateStr.charCodeAt(i)*(i+1);
  const yesterday=getYesterdayStr(dateStr);
  let yIdx=-1;
  if(yesterday){
    let ySeed=0;
    for(let i=0;i<yesterday.length;i++) ySeed+=yesterday.charCodeAt(i)*(i+1);
    yIdx=ySeed % WIFE_QUOTES.length;
  }
  let idx=seed % WIFE_QUOTES.length;
  if(idx===yIdx) idx=(idx+1) % WIFE_QUOTES.length;
  return WIFE_QUOTES[idx];
}

function getYesterdayStr(dateStr){
  try{
    const d=new Date(dateStr+'T12:00:00');
    d.setDate(d.getDate()-1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

}

// ── 即時觀測（今天用）O-A0003-001 ──
async function fetchLiveObs(){
  const url=`https://opendata.cwa.gov.tw/api/v1/rest/datastore/O-A0003-001?Authorization=${API_KEY}&StationId=${STATION_ID}`;
  const res=await fetch(url);
  if(!res.ok) throw new Error('即時觀測資料抓取失敗 (HTTP '+res.status+')');
  const data=await res.json();
  const st=data?.records?.Station?.[0];
  if(!st) throw new Error('找不到基隆觀測站(466940)資料');
  const we=st.WeatherElement;
  const temp=parseFloat(we?.AirTemperature)||null;
  const windSpeed=parseFloat(we?.WindSpeed)||0;
  const windDir=we?.WindDirection||'—';
  const humidity=parseFloat(we?.RelativeHumidity)||null;
  // Now.Precipitation 不一定有，試多個路徑
  const rain10=parseFloat(we?.Now?.Precipitation??we?.Precipitation??0)||0;
  const obsTime=st.ObsTime?.DateTime||'';
  return{temp,windSpeed,windDir,humidity,rain10,obsTime};
}

// ── 今日逐小時雨量（Open-Meteo）──
async function fetchHourlyRain(){
  const LAT=25.1276, LON=121.7392;
  // past_hours=24 讓已過去的時段用 ERA5 再分析資料（比純預測更接近實際）
  // forecast_days=2 補足今天剩餘時數
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=precipitation&timezone=Asia%2FTaipei&past_hours=24&forecast_days=2`;
  try{
    const res=await fetch(url);
    if(!res.ok) return null;
    const data=await res.json();
    const times=data.hourly?.time||[];
    const vals=data.hourly?.precipitation||[];
    const today=getTodayStr();
    const nowH=new Date().getHours();
    // 只取今天的24小時，標記是否已過去
    const hours=[];
    for(let i=0;i<times.length;i++){
      if(times[i].substring(0,10)===today){
        const h=parseInt(times[i].substring(11,13));
        hours.push({h, mm:vals[i]||0, past:h<nowH, current:h===nowH});
      }
    }
    return hours.length?hours:null;
  }catch(e){ return null; }
}

    if(mm<40)   return{label:'大豪雨',  bg:'#EA580C',fg:'#FDBA74'};
    return      {label:'超大豪雨',      bg:'#DC2626',fg:'#FCA5A5'};

      <span style="font-family:'JetBrains Mono',monospace;font-size:8px;color:#BFDBFE">▌小雨</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:8px;color:#60A5FA">▌中雨</span>

// ── 一週預報（Open-Meteo，免費無需Key，基隆座標）──
async function fetchWeekForecast(){
  const wCh=['日','一','二','三','四','五','六'];
  // 基隆市座標
  const LAT=25.1276, LON=121.7392;
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum&timezone=Asia%2FTaipei&forecast_days=7`;
  try{
    const res=await fetch(url);
    if(!res.ok) throw new Error('Open-Meteo HTTP '+res.status);
    const data=await res.json();
    const d=data.daily;
    if(!d||!d.time) throw new Error('no daily data');

    // WMO 天氣代碼轉中文
    function wmoToWx(code){
      if(code===0) return '晴天';
      if(code<=2) return '多雲';
      if(code<=3) return '陰天';
      if(code<=48) return '霧';
      if(code<=57) return '毛毛雨';
      if(code<=67) return '小雨';
      if(code<=77) return '雪';
      if(code<=82) return '小雨';
      if(code<=86) return '大雪';
      if(code<=99) return '雷雨';
      return '多雲';
    }

    const days=d.time.map((dateStr,i)=>{
      const dt=new Date(dateStr+'T12:00:00');
      const maxT=Math.round(d.temperature_2m_max[i]);
      const minT=Math.round(d.temperature_2m_min[i]);
      const pop=d.precipitation_probability_max[i]||0;
      const rain_mm=Math.round((d.precipitation_sum[i]||0)*10)/10;
      const wxVal=wmoToWx(d.weathercode[i]);
      return{dateStr,maxT,minT,pop,rain_mm,wxVal,weekday:wCh[dt.getDay()]};
    });
    console.log('Open-Meteo OK, days:',days.length);
    return days;
  }catch(e){
    console.warn('Open-Meteo error:',e.message);
  }

  // fallback：F-C0032-001（今明2天）
  try{
    const url=`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-C0032-001?Authorization=${API_KEY}&locationName=%E5%9F%BA%E9%9A%86%E5%B8%82`;
    const res=await fetch(url);
    if(res.ok){
      const data=await res.json();
      const loc=data?.records?.location?.[0];
      if(loc){
        const els={}, days=[], seen=new Set();
        (loc.weatherElement||[]).forEach(e=>{ els[e.elementName]=e.time||[]; });
        for(const t of (els['MaxT']||[])){
          const dateStr=(t.startTime||'').substring(0,10);
          if(!dateStr||seen.has(dateStr)) continue;
          seen.add(dateStr);
          const d=new Date(dateStr+'T12:00:00');
          const maxT=parseInt(t.parameter?.parameterName)||null;
          const minEntry=(els['MinT']||[]).find(tt=>(tt.startTime||'').substring(0,10)===dateStr);
          const minT=parseInt(minEntry?.parameter?.parameterName)||null;
          const popEntry=(els['PoP']||[]).find(tt=>(tt.startTime||'').substring(0,10)===dateStr);
          const pop=parseInt(popEntry?.parameter?.parameterName)||0;
          const wxEntry=(els['Wx']||[]).find(tt=>(tt.startTime||'').substring(0,10)===dateStr);
          const wxVal=wxEntry?.parameter?.parameterName||'';
          days.push({dateStr,maxT,minT,pop,wxVal,weekday:wCh[d.getDay()]});
        }
        if(days.length) return days;
      }
    }
  }catch(e){}
  return [];
}
// ── 今明36小時預報（非今天的日期用）F-C0032-001 ──
async function fetchWeatherForecast(dateStr){
  const url=`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-C0032-001?Authorization=${API_KEY}&locationName=%E5%9F%BA%E9%9A%86%E5%B8%82`;
  const res=await fetch(url);
  if(!res.ok)throw new Error('天氣資料抓取失敗，請確認網路連線');
  const data=await res.json();
  const loc=data.records&&data.records.location&&data.records.location[0];
  if(!loc)throw new Error('找不到基隆天氣資料');
  const els={};
  (loc.weatherElement||[]).forEach(e=>els[e.elementName]=e.time);

  const target=new Date(dateStr+'T12:00:00+08:00');
  function findVal(times){
    if(!times||!times.length)return null;
    for(const t of times){
      const s=new Date(t.startTime);
      const e=new Date(t.endTime);
      if(target>=s&&target<e)return t.parameter&&t.parameter.parameterName;
    }
    return times[0]&&times[0].parameter&&times[0].parameter.parameterName;
  }
  function findUnit(times){
    if(!times||!times.length)return null;
    for(const t of times){
      const s=new Date(t.startTime);
      const e=new Date(t.endTime);
      if(target>=s&&target<e)return t.parameter&&t.parameter.parameterUnit;
    }
    return times[0]&&times[0].parameter&&times[0].parameter.parameterUnit;
  }

  const tMax=parseInt(findVal(els.MaxT))||28;
  const tMin=parseInt(findVal(els.MinT))||22;
  const rainProb=parseInt(findVal(els.PoP))||30;
  const wxDesc=findVal(els.Wx)||'';
  const wsDesc=findVal(els.WS)||'';
  const wdDesc=findUnit(els.WS)||'';

  function decodeWxDesc(desc){
    if(!desc)return{text:'多雲',emoji:'⛅',tag:'cloud'};
    if(desc.includes('雷'))return{text:'雷雨',emoji:'⛈',tag:'rain'};
    if(desc.includes('大雨')||desc.includes('豪雨'))return{text:'大雨',emoji:'🌧',tag:'rain'};
    if(desc.includes('雨'))return{text:'小雨',emoji:'🌧',tag:'rain'};
    if(desc.includes('陰'))return{text:'陰天',emoji:'🌥',tag:'cloud'};
    if(desc.includes('晴'))return{text:'晴天',emoji:'☀️',tag:'sun'};
    if(desc.includes('多雲'))return{text:'多雲',emoji:'⛅',tag:'cloud'};
    return{text:'多雲',emoji:'⛅',tag:'cloud'};
  }
  function decodeWindDesc(desc){
    if(!desc)return{text:'輕風',beaufort:2,alert:false};
    const n=parseFloat(desc);
    if(isNaN(n))return{text:'輕風',beaufort:2,alert:false};
    if(n>=8)return{text:'強風特報 '+Math.round(n)+' 級',beaufort:Math.round(n),alert:true};
    if(n>=6)return{text:'強風 6–7 級',beaufort:6,alert:false};
    if(n>=4)return{text:'4–5 級風',beaufort:4,alert:false};
    if(n>=2)return{text:'輕風',beaufort:2,alert:false};
    return{text:'無風',beaufort:0,alert:false};
  }

  const wx=decodeWxDesc(wxDesc);
  const wind=decodeWindDesc(wsDesc);
  const isRain=wx.tag==='rain';
  const rain=isRain?(rainProb>70?20:5):0;
  const isHeavyRain=isRain&&rain>15;
  const isBothBad=isRain&&wind.alert;
  const windKmh=wind.beaufort*3.6*2;
  return{wx,wind,tMax,tMin,windKmh,rain,rainProb,isRain,isHeavyRain,isBothBad};
}

function buildStrategy(w,di){
  const{wx,wind,tMax,tMin,rain,rainProb,isRain,isHeavyRain,rainMM}=w;
  const{label,dayType,isWeekend,isFriday,isHoliday,dateStr}=di;

  // ══ 台灣連假清單 ══
  const HOLIDAYS=[
    '01-01','02-28','04-04','04-05','05-01','06-06',
    '09-28','10-10','12-25',
    '01-27','01-28','01-29','01-30','01-31','02-01','02-02',
  ];
  const mmdd = dateStr ? dateStr.slice(5) : '';
  const isNationalHoliday = HOLIDAYS.includes(mmdd);
  const isLongHoliday = isNationalHoliday || (isWeekend && isFriday);

  // ══ 逐時雨量輔助：取某時段（startH含, endH不含）的最大雨量 ══
  const hourlyRain = w.hourlyRain || null;
  function slotMaxMM(startH, endH){
    if(!hourlyRain||!hourlyRain.length) return null;
    const entries = hourlyRain.filter(h => h.h >= startH && h.h < endH);
    if(!entries.length) return null;
    return Math.max(...entries.map(h=>h.mm||0));
  }

  // ══ 雨量等級解析（共用）══
  function mmToRainInfo(x){
    if(x===null||x===undefined) return null;
    if(x <= 0)    return {isRain:false, text:'無雨',    emoji:'—',    tag:'ok',   bonus:0,  strategy:''};
    if(x < 0.5)   return {isRain:true,  text:'毛毛雨',  emoji:'🌦',   tag:'rain', bonus:0,  strategy:'毛毛雨，備雨衣正常跑'};
    if(x < 1.0)   return {isRain:true,  text:'小雨',    emoji:'🌦',   tag:'rain', bonus:5,  strategy:'+5元，注意路面濕滑'};
    if(x < 1.5)   return {isRain:true,  text:'中雨',    emoji:'🌧',   tag:'rain', bonus:10, strategy:'+10元，挑短單優先'};
    if(x < 2.5)   return {isRain:true,  text:'中雨',    emoji:'🌧',   tag:'rain', bonus:15, strategy:'+15元，稍微挑短單'};
    if(x < 3.0)   return {isRain:true,  text:'中雨',    emoji:'🌧',   tag:'rain', bonus:20, strategy:'+20元，優先近距離單'};
    if(x < 10)    return {isRain:true,  text:'大雨',    emoji:'🌧',   tag:'rain', bonus:40, strategy:'+40元，保守跑不空等'};
    if(x < 20)    return {isRain:true,  text:'豪雨',    emoji:'⛈',   tag:'rain', bonus:60, strategy:'+60元，視平台補貼決定是否出門'};
    if(x < 40)    return {isRain:true,  text:'大豪雨',  emoji:'⛈',   tag:'rain', bonus:60, strategy:'+60元，安全第一'};
    return         {isRain:true,  text:'超大豪雨',emoji:'⛈',   tag:'rain', bonus:60, strategy:'+60元，建議暫停'};
  }

  // 全天代表雨量（目前時刻，用於天氣bar + 全域判斷）
  const mm = (typeof rainMM === 'number' && !isNaN(rainMM)) ? rainMM : rain;
  const globalRainInfo = mmToRainInfo(mm);
  const isRainNow = mm > 0;
  const isSunny = !isRainNow;
  const isHeavyRainNow = mm >= 4.0;

  // ══ 各時段雨量（逐時資料存在則用，否則用全域）══
  // 09-11 開局, 11-13.5 午餐, 13.5-17 過渡, 17-20.5 主戰場, 20.5-21 收尾
  const mmMorning  = slotMaxMM(9,  11);
  const mmLunch    = slotMaxMM(11, 14); // 11:00-13:30，取到14
  const mmMid      = slotMaxMM(14, 17);
  const mmEvening  = slotMaxMM(17, 21);
  const mmClosing  = slotMaxMM(20, 21);

  const ri_morning_ex = mmToRainInfo(mmMorning  !== null ? mmMorning  : mm);
  const ri_lunch_ex   = mmToRainInfo(mmLunch    !== null ? mmLunch    : mm);
  const ri_mid_ex     = mmToRainInfo(mmMid      !== null ? mmMid      : mm);
  const ri_evening_ex = mmToRainInfo(mmEvening  !== null ? mmEvening  : mm);
  const ri_closing_ex = mmToRainInfo(mmClosing  !== null ? mmClosing  : mm);

  // 各時段 tag / tagText（風優先）
  function slotTag(ri)  { return wind.alert ? 'wind' : ri.tag; }
  function slotText(ri) { return wind.alert ? '強風'  : ri.text; }

  // ══ 星期幾底線（新規則）══
  // 週一~四 全日：單55／雙110
  // 週五 早~午：單55／雙110；晚上（17:00後）：單55／雙110（單量增加）
  // 週六~日 白天：單55／雙110；晚上（17:00後）：單60／雙120
  const wdDate = dateStr ? new Date(dateStr+'T00:00:00') : new Date();
  const wd = wdDate.getDay();

  // baseS/baseD = 白天底線（全週一律 55/110）
  const baseS = 55, baseD = 110;
  // 晚上底線：週六日 60/120，其餘仍 55/110
  const isWeekendDay = (wd === 0 || wd === 6);
  const eveningS = isWeekendDay ? 60 : 55;
  const eveningD = isWeekendDay ? 120 : 110;

  // ── 雨量加成（新規則，直接疊加在底線上）──
  // 0mm→+0, 0.5mm→+5, 1.0mm→+10, 1.5~2.0mm→+15~+20, 3.0mm→+40, 豪雨→+60
  function rainBonusFromMM(x) {
    if (!x || x <= 0)  return 0;
    if (x < 0.5)       return 0;   // 毛毛雨，未達 0.5 不加
    if (x < 1.0)       return 5;   // 0.5mm +5
    if (x < 1.5)       return 10;  // 1.0mm +10
    if (x < 2.5)       return 15 + Math.round((x - 1.5) / 0.5) * 5; // 1.5~2.0 → +15~+20
    if (x < 3.0)       return 20;  // 2.0~3.0 → +20
    if (x < 10)        return 40;  // 3.0mm+ 大雨 → +40
    return 60;                      // 豪雨+ → +60
  }

  // 各時段底線（白天 vs 晚上）+ 雨量加成（雙單加成 = 單單加成 × 2）
  function slotThreshold(ri, isEvening) {
    const bS = isEvening ? eveningS : baseS;
    const bD = isEvening ? eveningD : baseD;
    const mmVal = ri ? (ri._rawMM !== undefined ? ri._rawMM : 0) : 0;
    const bonusS = rainBonusFromMM(mmVal);
    const bonusD = bonusS * 2;
    return { s: bS + bonusS, d: bD + bonusD, bonus: bonusS };
  }

  // 為了讓 mmToRainInfo 回傳的物件帶原始 mm 值，把 _rawMM 注入
  function mmToRainInfoEx(x) {
    const info = mmToRainInfo(x);
    if (info) info._rawMM = (x !== null && x !== undefined) ? x : 0;
    return info;
  }

  const ri_morning_ex = mmToRainInfoEx(mmMorning  !== null ? mmMorning  : mm);
  const ri_lunch_ex   = mmToRainInfoEx(mmLunch    !== null ? mmLunch    : mm);
  const ri_mid_ex     = mmToRainInfoEx(mmMid      !== null ? mmMid      : mm);
  const ri_evening_ex = mmToRainInfoEx(mmEvening  !== null ? mmEvening  : mm);
  const ri_closing_ex = mmToRainInfoEx(mmClosing  !== null ? mmClosing  : mm);

  const th = {
    morning: slotThreshold(ri_morning_ex, false),
    lunch:   slotThreshold(ri_lunch_ex,   false),
    mid:     slotThreshold(ri_mid_ex,     false),
    evening: slotThreshold(ri_evening_ex, true),   // 17:00後 → 用晚上底線
    closing: slotThreshold(ri_closing_ex, true),
  };

  // ══ 全天天氣 bar 顯示（用全域mm）══
  let wxText=wx.text, wxEmoji=wx.emoji;
  if(isRainNow){
    if(mm>=40)      {wxText='超大豪雨';wxEmoji='⛈';}
    else if(mm>=20) {wxText='大豪雨';  wxEmoji='⛈';}
    else if(mm>=10) {wxText='豪雨';    wxEmoji='🌧';}
    else if(mm>=4)  {wxText='大雨';    wxEmoji='🌧';}
    else if(mm>=1)  {wxText='中雨';    wxEmoji='🌧';}
    else if(mm>=0.5){wxText='小雨';    wxEmoji='🌦';}
    else            {wxText='毛毛雨';  wxEmoji='🌦';}
  }

  // 代表全天的 tag（天氣bar + 警示用）
  const wxTag=wind.alert?'wind':isRainNow?'rain':wx.tag;

  // ══ 各段提示語 ══
  const morningTip=
    isHeavyRainNow?   '大雨天早上單量少，先熱身 2 單。中正路下坡、義二路路面濕滑，減速慢行。':
    wind.alert?       '強風天早上先測風向，孝一路橋段小心側風，感覺路況再決定是否加速。':
    ri_morning_ex.isRain?'下雨早上不強求，先熱身 2–3 單，在仁愛區百貨附近待機單量穩定。':
    isWeekend?        '假日早上 10 點後才起量，在中正區、仁愛區待機，等單不要亂跑。':
                      '平日早上單量少，先熱身 2–3 單感覺路況，在仁愛區或崇仁市場附近待機。';
  const lunchTip=
    ri_lunch_ex.bonus>=40?'大雨午餐是今天最好賺時段！雨衣全套穿好，鎖定新豐街、信一路餐廳密集區衝量。':
    wind.alert?       '強風午餐只接平地單，山路橋上全不接。鎖定仁愛區、中正區，目標 4–5 單。':
    ri_lunch_ex.isRain?  '雨天午餐加成時段，不達門檻不接。專注新豐街、義二路商圈，拼 5–6 單。':
    isWeekend?        '假日午餐爆量！鎖定新豐街、仁一路餐廳，雙單優先，目標 6–8 單。':
                      '平日午餐衝量，不達門檻不接。在新豐街、義二路待機，目標 5–6 單。';
  const midTip=
    wind.alert?       '過渡段風大，在中正區、仁愛住宅區待機，20 分鐘無單換崇仁市場附近。':
    ri_mid_ex.isRain?    '下午單量緩，順路跑不強求。在仁愛區、中正住宅區待機，20 分鐘無單換區。':
    isWeekend?        '假日下午仍有單，在新豐街、義二路商圈待機，順路跑不強求遠距離。':
                      '平日下午單少，在仁愛區、中正住宅區待機，20 分鐘無單換崇仁市場附近。';
  const eveningTip=
    ri_evening_ex.bonus>=40?'今天收入關鍵！大雨晚餐單量爆發，雨衣全套穿好。鎖定新豐街、深溪路住宅，雙單優先，目標 6–8 單。':
    wind.alert?         '強風晚餐只接平地單。鎖定新豐街、信一路，上班族下班餐潮，目標 5–6 單。':
    ri_evening_ex.isRain?  '今天收入關鍵！雨天晚餐加成，鎖定新豐街、深溪路住宅雙單，目標 6–7 單。':
    isWeekend?          '今天收入關鍵！假日晚餐最旺，鎖定新豐街、義二路、中正區，雙單優先，目標 8–10 單。':
                        '今天收入關鍵！上班族下班點餐潮，鎖定新豐街、深溪路住宅雙單，目標 6–8 單。';

  const targetOrders=isWeekend?'18–22':isFriday?'16–20':'14–18';
  const targetIncome=isWeekend?'1,800–2,200':isFriday?'1,600–2,000':'1,500–1,800';
  const alertHtml=(wind.alert||isHeavyRainNow)?`<div class="alert"><div class="alert-title">⚠ 今日特別警示</div>${wind.alert?`強風特報，陣風 ${wind.beaufort} 級。孝一路橋、中山高架橋上今日完全不接。`:''}${isHeavyRainNow?'大雨路面濕滑，義二路下坡積水路段減速。視線差時主動靠邊暫停。':''}${wind.alert&&!isHeavyRainNow?'雨衣備好，視線差時主動靠邊暫停。':''}</div>`:'';
  const nogoItems=[];
  if(wind.alert)nogoItems.push('山路單、橋上單 → 強風特報，全天不接');
  nogoItems.push('等餐超過 10 分鐘 → 果斷棄單');
  nogoItems.push(`單單低於 ${th.lunch.s} → 直接跳過`);
  nogoItems.push(`雙單低於 ${th.lunch.d} → 直接跳過`);
  if(isHeavyRainNow)nogoItems.push('能見度差時主動暫停 → 安全第一');
  nogoItems.push('距離超過 5km → 不接');
  nogoItems.push('逆向單 → 不接');

  const rainBonus = isSunny ? 0 : rainBonusFromMM(mm);
  const rainStrategy = isSunny ? '' : globalRainInfo.strategy;
  const rainMmDisplay = isSunny ? '—' : mm.toFixed(1)+' mm';
  const rainBonusDisplay = isSunny ? '' : `（+${rainBonus}元）`;
  const rainColor = rainBonus >= 40 ? '#F87171' : rainBonus >= 15 ? '#FB923C' : rainBonus >= 5 ? '#60A5FA' : '#9CA3AF';
  const wxDesc=`${wxEmoji} ${wxText} ${tMin}–${tMax}°C${wind.alert?'，'+wind.text:''}${isRainNow?`，即時雨量 ${mm.toFixed(1)}mm${rainBonusDisplay}`:''}`;
  const dayChar=isWeekend?'假日單量旺，晚餐是重頭戲':isFriday?'週五下班潮早，晚餐搶先卡位':'平日早午單少，晚餐上班族下班是關鍵';

  // 第三格：今天顯示即時雨量，未來/過去顯示降雨機率
  const isLiveMode = (typeof w.isLiveObs !== 'undefined') ? w.isLiveObs : false;
  let col3Val, col3Label, col3Color;
  if(isLiveMode){
    col3Val = isSunny ? '—' : mm.toFixed(1)+' mm';
    col3Label = isSunny ? '即時雨量' : '雨量/+加價';
    col3Color = isSunny ? '#444' : rainColor;
  } else {
    const pop = rainProb || 0;
    col3Val = pop > 0 ? pop+'%' : '—';
    col3Label = '降雨機率';
    col3Color = pop >= 70 ? '#F87171' : pop >= 40 ? '#60A5FA' : '#444';
  }

  return `
  <div class="weather-bar">
    <div class="w-item"><div class="w-val">${wxEmoji} ${wxText}</div><div class="w-label">全天天氣</div></div>
    <div class="w-item"><div class="w-val">${tMin!==null&&tMax!==null?tMin+'–'+tMax+'°':'—'}</div><div class="w-label">氣溫</div></div>
    <div class="w-item"><div class="w-val" style="color:${col3Color}">${col3Val}${isLiveMode&&rainBonus>0?' +'+rainBonus:''}</div><div class="w-label">${col3Label}</div></div>
  </div>
  ${isSunny?'':`<div style="background:#0A1020;border:1px solid rgba(96,165,250,0.15);border-left:3px solid rgba(96,165,250,0.4);border-radius:4px;padding:8px 12px;margin-bottom:14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#93C5FD;line-height:1.6">${wxEmoji} ${wxText}（${mm.toFixed(1)} mm）${rainBonus>0?`→ 加價 <b>+${rainBonus}元</b>｜策略：${rainStrategy}`:`→ 無加價｜${rainStrategy}`}</div>`}
  ${alertHtml}
  <div class="block">
    <div class="time-row"><div class="time-emoji">🌅</div><div class="time-range">09:00–11:00</div><div class="time-name">開局段</div><div class="cond-tag tag-${slotTag(ri_morning_ex)}">${slotText(ri_morning_ex)}</div></div>
    <div class="price-line"><div class="price-type">單</div><div class="price-gte">≥</div><div class="price-val c-white">${th.morning.s}</div><div class="price-unit">元</div></div>
    <div class="price-line"><div class="price-type">雙</div><div class="price-gte">≥</div><div class="price-val c-white">${th.morning.d}</div><div class="price-unit">元</div></div>
    <div class="tip"><div class="tip-inner gray">${morningTip}</div></div>
  </div>
  <div class="block">
    <div class="time-row"><div class="time-emoji">🍱</div><div class="time-range">11:00–13:30</div><div class="time-name">午餐段</div><div class="cond-tag tag-${slotTag(ri_lunch_ex)}">${slotText(ri_lunch_ex)}</div></div>
    <div class="price-line"><div class="price-type">單</div><div class="price-gte">≥</div><div class="price-val c-orange">${th.lunch.s}</div><div class="price-unit">元</div></div>
    <div class="price-line"><div class="price-type">雙</div><div class="price-gte">≥</div><div class="price-val c-orange">${th.lunch.d}</div><div class="price-unit">元</div></div>
    <div class="tip"><div class="tip-inner red">${lunchTip}</div></div>
  </div>
  <div class="block">
    <div class="time-row"><div class="time-emoji">☀️</div><div class="time-range">13:30–17:00</div><div class="time-name">過渡段</div><div class="cond-tag tag-${slotTag(ri_mid_ex)}">${slotText(ri_mid_ex)}</div></div>
    <div class="price-line"><div class="price-type">單</div><div class="price-gte">≥</div><div class="price-val c-blue">${th.mid.s}</div><div class="price-unit">元</div></div>
    <div class="price-line"><div class="price-type">雙</div><div class="price-gte">≥</div><div class="price-val c-blue">${th.mid.d}</div><div class="price-unit">元</div></div>
    <div class="tip"><div class="tip-inner blue">${midTip}</div></div>
  </div>
  <div class="block">
    <div class="time-row"><div class="time-emoji">🌙</div><div class="time-range">17:00–20:30</div><div class="time-name">主戰場</div><div class="cond-tag tag-${slotTag(ri_evening_ex)}">${slotText(ri_evening_ex)}</div></div>
    <div class="price-line"><div class="price-type">單</div><div class="price-gte">≥</div><div class="price-val c-red">${th.evening.s}</div><div class="price-unit">元</div></div>
    <div class="price-line"><div class="price-type">雙</div><div class="price-gte">≥</div><div class="price-val c-red">${th.evening.d}</div><div class="price-unit">元</div></div>
    <div class="tip"><div class="tip-inner green">${eveningTip}</div></div>
  </div>
  <div class="block">
    <div class="time-row"><div class="time-emoji">🏁</div><div class="time-range">20:30–21:00</div><div class="time-name">收尾段</div><div class="cond-tag tag-${slotTag(ri_closing_ex)}">${slotText(ri_closing_ex)}</div></div>
    <div class="price-line"><div class="price-type">單</div><div class="price-gte">≥</div><div class="price-val c-purple">${th.closing.s}</div><div class="price-unit">元</div></div>
    <div class="price-line"><div class="price-type">雙</div><div class="price-gte">≥</div><div class="price-val c-purple">${th.closing.d}</div><div class="price-unit">元</div></div>
    <div class="tip"><div class="tip-inner gray">達標就收班。差 100 元內才值得再跑 1–2 單，不勉強跑遠距離。</div></div>
  </div>
  <div class="nogo">
    <div class="nogo-head">今日棄單原則</div>
    ${nogoItems.map(t=>`<div class="nogo-item"><div class="nogo-x">✕</div><div>${t}</div></div>`).join('')}
  </div>
  <div class="today-note">
    <span>今日天氣：</span>${wxDesc}<br>
    <span>${dayType}特性：</span>${dayChar}<br>
    <span>目標：</span>全日 ${targetOrders} 單，淨收 ${targetIncome} 元
  </div>`;
}

let currentDateStr='';
let rainRefreshTimer=null;
let lastForecastData=null;
let lastWeekDays=[];

// ── 天氣描述解析 ──
function decodeWx(desc){
  if(!desc)return{text:'多雲',emoji:'⛅',tag:'cloud'};
  if(desc.includes('雷'))return{text:'雷雨',emoji:'⛈',tag:'rain'};
  if(desc.includes('大雨')||desc.includes('豪雨'))return{text:'大雨',emoji:'🌧',tag:'rain'};
  if(desc.includes('雨'))return{text:'小雨',emoji:'🌧',tag:'rain'};
  if(desc.includes('陰'))return{text:'陰天',emoji:'🌥',tag:'cloud'};
  if(desc.includes('晴'))return{text:'晴天',emoji:'☀️',tag:'sun'};
  if(desc.includes('多雲'))return{text:'多雲',emoji:'⛅',tag:'cloud'};
  return{text:'多雲',emoji:'⛅',tag:'cloud'};
}
function decodeWind(ms){
  // ms = 風速 m/s
  if(ms>=17.2)return{text:'強風特報',beaufort:8,alert:true};
  if(ms>=10.8)return{text:'強風 6–7級',beaufort:6,alert:false};
  if(ms>=5.5) return{text:'4–5級風',beaufort:4,alert:false};
  if(ms>=1.6) return{text:'輕風',beaufort:2,alert:false};
  return{text:'無風',beaufort:0,alert:false};
}

// ── 一週預報條渲染 ──
function renderWeekStrip(days, selectedDate){
  if(!days||!days.length) return;
  const today=getTodayStr();
  document.getElementById('weekStrip').style.display='block';
  document.getElementById('weekUpdated').textContent='7天預報';
  const container=document.getElementById('weekDays');
  container.innerHTML=days.map(d=>{
    const wx=decodeWx(d.wxVal);
    const isToday=d.dateStr===today;
    const isSelected=d.dateStr===selectedDate;
    const mm=typeof d.rain_mm==='number'?d.rain_mm:null;
    const rainColor=mm===null?'#2A2A2A':mm>=4?'#F87171':mm>=1?'#60A5FA':'#2A4A2A';
    const rainText=mm===null?'—':mm>0?mm.toFixed(1)+'mm':'0mm';
    return `<div class="week-day${isSelected?' active':''}" onclick="selectDay('${d.dateStr}')">
      <div class="week-day-name${isToday?' today-mark':''}">${isToday?'今天':'週'+d.weekday}</div>
      <div class="week-day-emoji">${wx.emoji}</div>
      <div class="week-day-pop" style="color:${rainColor};font-size:10px;font-weight:700;margin-top:2px">${rainText}</div>
    </div>`;
  }).join('');
}

function selectDay(dateStr){
  document.getElementById('datePicker').value=dateStr;
  runForDate(dateStr);
}

// ── 七天天氣圖渲染 ──
function renderWeekChart(days, selectedDate){
  if(!days||!days.length){
    document.getElementById('weekChart').style.display='none';
    return;
  }
  document.getElementById('weekChart').style.display='block';
  document.getElementById('weekChartSub').textContent='點欄位可查詢策略';

  const today=getTodayStr();
  // 計算溫度範圍以縮放bar高度
  const allMax=days.map(d=>d.maxT).filter(v=>v!==null);
  const allMin=days.map(d=>d.minT).filter(v=>v!==null);
  const globalMax=allMax.length?Math.max(...allMax):35;
  const globalMin=allMin.length?Math.min(...allMin):15;
  const range=Math.max(globalMax-globalMin,1);
  const BAR_H=52; // px 可用高度

  const bars=document.getElementById('wcBars');
  const tempRow=document.getElementById('wcTempRow');
  const popRow=document.getElementById('wcPopRow');
  const dateRow=document.getElementById('wcDateRow');

  bars.innerHTML='';
  tempRow.innerHTML='';
  popRow.innerHTML='';
  dateRow.innerHTML='';

  days.forEach(d=>{
    const wx=decodeWx(d.wxVal);
    const isToday=d.dateStr===today;
    const isSelected=d.dateStr===selectedDate;
    const maxH=d.maxT!==null?Math.round(((d.maxT-globalMin)/range)*BAR_H)+6:6;
    const minH=d.minT!==null?Math.round(((d.minT-globalMin)/range)*BAR_H)+6:6;
    const popPct=d.pop||0;
    const popHigh=popPct>=50;

    // bar 欄
    const col=document.createElement('div');
    col.className='wc-col';
    col.style.cursor='pointer';
    if(isSelected) col.style.background='rgba(167,139,250,0.07)';
    col.onclick=()=>selectDay(d.dateStr);

    // 降雨機率半透明背景
    const popBgH=Math.round(popPct/100*BAR_H);
    col.innerHTML=`
      <div style="font-size:14px;line-height:1;margin-bottom:2px;text-align:center">${wx.emoji}</div>
      <div style="position:relative;width:100%;height:${BAR_H}px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end">
        ${popPct>0?`<div style="position:absolute;bottom:0;left:5%;width:90%;border-radius:2px 2px 0 0;height:${popBgH}px;background:rgba(96,165,250,0.18)"></div>`:''}
        <div style="width:55%;height:${maxH}px;border-radius:2px 2px 0 0;background:linear-gradient(180deg,#FB923C,#F59E0B);opacity:${isSelected?1:0.75}"></div>
        <div style="width:55%;height:${minH}px;border-radius:0 0 2px 2px;background:linear-gradient(180deg,#3B82F6,#60A5FA);opacity:${isSelected?1:0.75}"></div>
      </div>`;
    bars.appendChild(col);

    // 溫度行
    const tCell=document.createElement('div');
    tCell.style.cssText='flex:1;text-align:center';
    tCell.innerHTML=`<div class="wc-t max">${d.maxT!==null?d.maxT+'°':'—'}</div><div class="wc-t min">${d.minT!==null?d.minT+'°':'—'}</div>`;
    tempRow.appendChild(tCell);

    // 降雨機率行
    const pCell=document.createElement('div');
    pCell.className=`wc-pop${popHigh?' high':''}`;
    pCell.style.flex='1';
    pCell.textContent=popPct?popPct+'%':'';
    popRow.appendChild(pCell);

    // 日期行
    const dCell=document.createElement('div');
    dCell.style.flex='1';
    dCell.style.textAlign='center';
    let cls='wc-date';
    if(isToday) cls+=' wc-today';
    else if(isSelected) cls+=' wc-selected';
    dCell.className=cls;
    dCell.textContent=isToday?'今天':'週'+d.weekday;
    dateRow.appendChild(dCell);
  });
}

// ── 即時觀測條渲染 ──
function renderLiveBar(obs){
  const windMs=obs.windSpeed||0;
  const windKmh=Math.round(windMs*3.6);
  // obsTime 可能是 "2025-04-11T16:30:00+08:00" 或 "2025-04-11 16:30:00"
  let timeStr='';
  if(obs.obsTime){
    const raw=obs.obsTime.replace('T',' ');
    const m=raw.match(/(\d{2}:\d{2})/);
    timeStr=m?m[1]:'';
  }
  return `<div class="live-bar" id="liveBar">
    <div class="live-item"><div class="live-val" id="liveTemp">${obs.temp!==null?obs.temp+'°':'—'}</div><div class="live-label">即時溫度</div></div>
    <div class="live-item"><div class="live-val" id="liveWind">${windKmh} km/h</div><div class="live-label">風速</div></div>
    <div class="live-item"><div class="live-val" id="liveHumidity">${obs.humidity!==null?obs.humidity+'%':'—'}</div><div class="live-label">濕度</div></div>
    <div class="live-item"><div class="live-val" id="liveRain">${obs.rain10.toFixed(1)}</div><div class="live-label">雨量mm</div></div>
  </div>
  <div class="live-time" id="liveTime">觀測時間 ${timeStr} · 每10分鐘更新</div>`;
}

// ── 即時觀測條局部更新（自動刷新用，不重繪整個策略）──
function updateLiveBarDOM(obs){
  const windMs=obs.windSpeed||0;
  const windKmh=Math.round(windMs*3.6);
  let timeStr='';
  if(obs.obsTime){
    const raw=obs.obsTime.replace('T',' ');
    const m=raw.match(/(\d{2}:\d{2})/);
    timeStr=m?m[1]:'';
  }
  const t=document.getElementById('liveTemp');
  const w=document.getElementById('liveWind');
  const h=document.getElementById('liveHumidity');
  const r=document.getElementById('liveRain');
  const lt=document.getElementById('liveTime');
  if(t) t.textContent=obs.temp!==null?obs.temp+'°':'—';
  if(w) w.textContent=windKmh+' km/h';
  if(h) h.textContent=obs.humidity!==null?obs.humidity+'%':'—';
  if(r) r.textContent=obs.rain10.toFixed(1);
  if(lt) lt.textContent=`觀測時間 ${timeStr} · 每10分鐘更新`;
}

async function runForDate(dateStr){
  document.getElementById('errorBox').style.display='none';
  document.getElementById('strategyContent').innerHTML='';
  document.getElementById('regenBtn').style.display='none';
  currentDateStr=dateStr;
  showWifeQuote(dateStr);
  if(rainRefreshTimer){clearInterval(rainRefreshTimer);rainRefreshTimer=null;}

  const today=getTodayStr();
  const di=getDateInfo(dateStr);
  const isPast=dateStr<today;
  const isFuture=dateStr>today;
  const isToday=dateStr===today;

  showLoading(true);

  try{
    // 一週預報條（快取30分鐘，但空陣列不快取）
    const weekCacheKey='kl_w8_'+today;
    let weekDays=lastWeekDays;
    if(!weekDays.length){
      const wc=localStorage.getItem(weekCacheKey);
      if(wc){
        try{
          const obj=JSON.parse(wc);
          // 有資料且未過期才用快取
          if(Date.now()-obj.t<30*60*1000 && obj.days&&obj.days.length)
            weekDays=obj.days;
          else
            localStorage.removeItem(weekCacheKey);
        }catch(e){ localStorage.removeItem(weekCacheKey); }
      }
    }
    if(!weekDays.length){
      setProgress(20,'抓取7天預報...');
      try{
        weekDays=await fetchWeekForecast();
        if(weekDays.length)
          localStorage.setItem(weekCacheKey,JSON.stringify({days:weekDays,t:Date.now()}));
        lastWeekDays=weekDays;
      }catch(e){ weekDays=[]; }
    }
    // 頁面內 debug（暫時）
    const dbg=document.getElementById('weekDebug');
    if(dbg) dbg.textContent=weekDays.length?'✓ 7天資料 '+weekDays.length+'筆 ('+weekDays[0].dateStr+'~'+weekDays[weekDays.length-1].dateStr+')':'✗ 7天資料抓取失敗';
    renderWeekStrip(weekDays,dateStr);
    renderWeekChart(weekDays,dateStr);

    let weather={};

    if(isToday){
      // 今天：同時抓即時觀測 + 逐時雨量，兩者一起決定天氣狀態
      setProgress(40,'抓取即時觀測資料...');
      let obs=null;
      try{ obs=await fetchLiveObs(); }
      catch(e){ console.warn('LiveObs failed, using forecast fallback:',e.message); }

      setProgress(60,'抓取逐時雨量...');
      let hourlyRain=null;
      try{ hourlyRain=await fetchHourlyRain(); }
      catch(e){ console.warn('HourlyRain failed:',e.message); }

      // 取「目前這小時」的逐時雨量作為主要 rainMM
      let hourlyRainMM=0;
      if(hourlyRain&&hourlyRain.length){
        const nowH=new Date().getHours();
        // 優先取 current，若找不到則取最近一筆有值的
        const curEntry=hourlyRain.find(h=>h.current);
        if(curEntry) hourlyRainMM=curEntry.mm||0;
        else{
          // 找最接近現在且非未來的那筆
          const past=hourlyRain.filter(h=>h.h<=nowH);
          if(past.length) hourlyRainMM=past[past.length-1].mm||0;
        }
      }

      let wind,rainMM,isRainNow,wxText,wxEmoji,wxTag;

      if(obs){
        wind=decodeWind(obs.windSpeed);
        // 逐時雨量優先；若逐時資料不可用才 fallback 用觀測站 rain10
        rainMM = hourlyRain ? hourlyRainMM : obs.rain10;
        isRainNow=rainMM>0;
        wxText='多雲';wxEmoji='⛅';wxTag='cloud';
        if(weekDays.length){
          const todayDay=weekDays.find(d=>d.dateStr===today);
          if(todayDay){const wx=decodeWx(todayDay.wxVal);wxText=wx.text;wxEmoji=wx.emoji;wxTag=wx.tag;}
        }
        if(isRainNow){
          wxTag='rain';
          if(rainMM>=40)      {wxText='超大豪雨';wxEmoji='⛈';}
          else if(rainMM>=20) {wxText='大豪雨';  wxEmoji='⛈';}
          else if(rainMM>=10) {wxText='豪雨';    wxEmoji='🌧';}
          else if(rainMM>=4)  {wxText='大雨';    wxEmoji='🌧';}
          else if(rainMM>=1)  {wxText='中雨';    wxEmoji='🌧';}
          else if(rainMM>=0.5){wxText='小雨';    wxEmoji='🌦';}
          else                {wxText='毛毛雨';  wxEmoji='🌦';}
        } else if(wxTag==='rain'){wxTag='cloud';wxEmoji='⛅';wxText='多雲';}
      } else {
        // fallback：用預報資料
        const todayDay=weekDays.find(d=>d.dateStr===today);
        const wx=todayDay?decodeWx(todayDay.wxVal):{text:'多雲',emoji:'⛅',tag:'cloud'};
        wxText=wx.text;wxEmoji=wx.emoji;wxTag=wx.tag;
        wind={text:'—',beaufort:0,alert:false};
        rainMM=hourlyRainMM;
        isRainNow=rainMM>0;
        if(isRainNow){
          wxTag='rain';
          if(rainMM>=4)       {wxText='大雨';    wxEmoji='🌧';}
          else if(rainMM>=1)  {wxText='中雨';    wxEmoji='🌧';}
          else if(rainMM>=0.5){wxText='小雨';    wxEmoji='🌦';}
          else                {wxText='毛毛雨';  wxEmoji='🌦';}
        }
      }

      weather={
        wx:{text:wxText,emoji:wxEmoji,tag:wxTag},
        wind,
        tMax:obs?.temp!==null&&obs?.temp!==undefined?Math.round(obs.temp)+2:28,
        tMin:obs?.temp!==null&&obs?.temp!==undefined?Math.round(obs.temp)-2:22,
        rain:rainMM,rainProb:isRainNow?80:20,
        isRain:isRainNow,isHeavyRain:rainMM>=4,
        rainMM,obs:obs||null,isLiveObs:!!obs,
        hourlyRain:hourlyRain||null  // 存起來供渲染用
      };

      // 10分鐘自動刷新
      rainRefreshTimer=setInterval(async()=>{
        try{
          const [newObs, newHourly]=await Promise.allSettled([fetchLiveObs(),fetchHourlyRain()]);
          const newObsVal=newObs.status==='fulfilled'?newObs.value:null;
          const newHourlyVal=newHourly.status==='fulfilled'?newHourly.value:null;

          // 取目前小時逐時雨量
          let newHourlyMM=0;
          if(newHourlyVal&&newHourlyVal.length){
            const nowH=new Date().getHours();
            const curE=newHourlyVal.find(h=>h.current);
            if(curE) newHourlyMM=curE.mm||0;
            else{const past=newHourlyVal.filter(h=>h.h<=nowH);if(past.length)newHourlyMM=past[past.length-1].mm||0;}
          }

          const newRain = newHourlyVal ? newHourlyMM : (newObsVal?newObsVal.rain10:weather.rain);
          const newWind = newObsVal ? decodeWind(newObsVal.windSpeed) : weather.wind;
          const newIsRain=newRain>0;
          let nwxText,nwxEmoji,nwxTag;
          if(newIsRain){
            nwxTag='rain';
            if(newRain>=40)      {nwxText='超大豪雨';nwxEmoji='⛈';}
            else if(newRain>=20) {nwxText='大豪雨';  nwxEmoji='⛈';}
            else if(newRain>=10) {nwxText='豪雨';    nwxEmoji='🌧';}
            else if(newRain>=4)  {nwxText='大雨';    nwxEmoji='🌧';}
            else if(newRain>=1)  {nwxText='中雨';    nwxEmoji='🌧';}
            else if(newRain>=0.5){nwxText='小雨';    nwxEmoji='🌦';}
            else                 {nwxText='毛毛雨';  nwxEmoji='🌦';}
          } else { nwxTag='cloud';nwxEmoji='⛅';nwxText='多雲'; }

          if(newObsVal) updateLiveBarDOM(newObsVal);

          const rainChanged=Math.abs(newRain-weather.rain)>=0.1||newIsRain!==weather.isRain;
          const windChanged=newWind.alert!==weather.wind.alert;
          if(rainChanged||windChanged){
            const newW={...weather,wx:{text:nwxText,emoji:nwxEmoji,tag:nwxTag},wind:newWind,rain:newRain,rainMM:newRain,isRain:newIsRain,isHeavyRain:newRain>=4,obs:newObsVal||weather.obs,hourlyRain:newHourlyVal||weather.hourlyRain};
            const newLiveBar=newObsVal?renderLiveBar(newObsVal):'';
            const newRainChart=newHourlyVal?renderRainChart(newHourlyVal):'';
            const newHtml=newLiveBar+newRainChart+buildStrategy(newW,di);
            document.getElementById('strategyContent').innerHTML=newHtml;
            Object.assign(weather,newW);
          }
        }catch(e){}
      },10*60*1000);

    } else if(isFuture){
      // 未來：優先用一週預報
      setProgress(60,'抓取未來天氣預報...');
      const dayData=weekDays.find(d=>d.dateStr===dateStr);
      if(dayData&&(dayData.maxT!==null||dayData.wxVal)){
        const wx=decodeWx(dayData.wxVal);
        const isRain=wx.tag==='rain';
        weather={
          wx,wind:{text:'—',beaufort:0,alert:false},
          tMax:dayData.maxT||28,tMin:dayData.minT||22,
          rainProb:dayData.pop||0,
          // Open-Meteo precipitation_sum 優先，否則用降雨機率粗估
          rainMM:typeof dayData.rain_mm==='number'?dayData.rain_mm:
            (dayData.pop>=90?5:dayData.pop>=70?2:dayData.pop>=50?0.8:dayData.pop>=30?0.3:0),
          rain:typeof dayData.rain_mm==='number'?dayData.rain_mm:
            (dayData.pop>=90?5:dayData.pop>=70?2:dayData.pop>=50?0.8:dayData.pop>=30?0.3:0),
          isRain,isHeavyRain:(dayData.rain_mm||0)>=4,isLiveObs:false
        };
      } else {
        // fallback：用 36小時預報（只有今明兩天，若日期在範圍內）
        try{
          setProgress(70,'嘗試預報資料...');
          const fw=await fetchWeatherForecast(dateStr);
          weather={...fw,rainMM:0,isLiveObs:false};
        }catch(e){
          // 超出預報範圍，顯示空策略
          weather={wx:{text:'無預報資料',emoji:'❓',tag:'cloud'},wind:{text:'—',beaufort:0,alert:false},tMax:null,tMin:null,rain:0,rainProb:0,isRain:false,isHeavyRain:false,rainMM:0};
        }
      }
    } else {
      // 過去：無法抓歷史，顯示說明
      setProgress(90,'整理完成...');
      await delay(200);
      showLoading(false);
      const badge=di.badge||'';
      document.getElementById('topTitle').innerHTML=`${di.label}${badge}<br>接單策略`;
      document.getElementById('strategyContent').innerHTML=`
        <div style="padding:24px 0;text-align:center;font-family:'JetBrains Mono',monospace;">
          <div style="font-size:32px;margin-bottom:12px">📅</div>
          <div style="font-size:12px;color:#444;line-height:1.8">過去日期無即時資料<br>氣象署不開放歷史天氣<br><br><span style="color:#2A2A2A">請選擇今天或未來日期</span></div>
        </div>`;
      document.getElementById('regenBtn').style.display='none';
      return;
    }

    setProgress(90,'計算接單門檻...');
    await delay(200);
    const liveBarHtml=isToday&&weather.obs?renderLiveBar(weather.obs):'';
    // 直接用已抓好的 hourlyRain（isToday 時已存在 weather.hourlyRain），不重複打 API
    const rainChartHtml=isToday&&weather.hourlyRain?renderRainChart(weather.hourlyRain):'';
    const html=liveBarHtml+rainChartHtml+buildStrategy(weather,di);
    renderOutput(html,di);

  }catch(e){
    showError(e.message||'發生錯誤，請稍後再試');
  }
}

function runDate(){
  const val=document.getElementById('datePicker').value;
  if(!val) return;
  runForDate(val);
}

function goToday(){
  const today=getTodayStr();
  document.getElementById('datePicker').value=today;
  runForDate(today);
}

function regen(){
  if(!currentDateStr) return;
  lastWeekDays=[];
  localStorage.removeItem('kl_w8_'+getTodayStr());
  if(rainRefreshTimer){clearInterval(rainRefreshTimer);rainRefreshTimer=null;}
  document.getElementById('strategyContent').innerHTML='';
  document.getElementById('regenBtn').style.display='none';
  document.getElementById('topTitle').innerHTML='基隆外送<br>每日策略';
  runForDate(currentDateStr);
}

// ══════════════════════════════════════════
//  雷達雨雲接近基隆判斷
// ══════════════════════════════════════════
async function checkRadarRain(){
  const dot=document.getElementById('radarDot');
  const txt=document.getElementById('radarApproach');
  txt.textContent='分析中...';
  dot.style.background='#2A3A5A';
  try{
    // 用 Open-Meteo 取得目前及未來2小時降雨量
    const LAT=25.13, LON=121.74;
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=precipitation,precipitation_probability&timezone=Asia%2FTaipei&forecast_days=1`;
    const res=await fetch(url);
    const data=await res.json();
    const times=data.hourly?.time||[];
    const prec=data.hourly?.precipitation||[];
    const prob=data.hourly?.precipitation_probability||[];
    const nowH=new Date().getHours();
    // 找目前、+1h、+2h
    let nowIdx=-1;
    const todayStr=getTodayStr();
    for(let i=0;i<times.length;i++){
      if(times[i]===`${todayStr}T${String(nowH).padStart(2,'0')}:00`){nowIdx=i;break;}
    }
    if(nowIdx<0){txt.textContent='⚠ 無法取得目前資料';return;}
    const cur=prec[nowIdx]||0;
    const n1=prec[nowIdx+1]||0;
    const n2=prec[nowIdx+2]||0;
    const curP=prob[nowIdx]||0;
    const n1P=prob[nowIdx+1]||0;

    let status,color,dotColor;
    if(cur>=1){
      status=`🌧 正在下雨！目前 ${cur.toFixed(1)}mm，注意行車`;
      color='#F87171'; dotColor='#F87171';
    } else if(cur>0){
      status=`🌦 目前小雨 ${cur.toFixed(1)}mm，繼續觀察`;
      color='#93C5FD'; dotColor='#60A5FA';
    } else if(n1>=1||n1P>=60){
      status=`⚠ 1小時後可能下雨（${n1P}%），建議備雨衣`;
      color='#FDE047'; dotColor='#F59E0B';
    } else if(n2>=0.5||curP>=40){
      status=`🌤 目前無雨，2小時內降雨機率 ${Math.max(curP,n1P)}%`;
      color='#A78BFA'; dotColor='#7C3AED';
    } else {
      status=`✅ 基隆目前無雨，未來2小時晴朗`;
      color='#6EE7B7'; dotColor='#10B981';
    }
    txt.style.color=color;
    txt.textContent=status;
    dot.style.background=dotColor;
    document.getElementById('radarStatus').textContent=`${nowH}:00 更新`;
  }catch(e){
    txt.textContent='⚠ 判斷失敗，請看地圖';
    dot.style.background='#555';
  }
}

window.addEventListener('DOMContentLoaded',()=>{
  const today=getTodayStr();
  document.getElementById('datePicker').value=today;
  showWifeQuote(today);
  runForDate(today);
  // 頁面載入後延遲2秒再判斷雷達（等API穩定）
  setTimeout(checkRadarRain, 2000);
  // 每10分鐘自動更新雷達判斷
  setInterval(checkRadarRain, 10*60*1000);
});
