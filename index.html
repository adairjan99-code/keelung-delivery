<div class="card">

<script>
// ══════════════════════════════════════════
//  核心邏輯
// ══════════════════════════════════════════
function getTodayStr(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function showWifeQuote(dateStr){
  const quotes=[
    "老公加油，騎車小心，早點回家！",
    "今天也要平安歸來喔，愛你！",
    "辛苦了，記得多喝水，別太累。",
    "你是家裡的支柱，安全第一！",
    "加油！賺錢重要，身體更重要。",
    "等下班一起吃好吃的，加油！",
    "基隆路滑，過彎要慢一點喔。",
    "下雨天視線不好，慢慢騎就好。"
  ];
  const idx=Math.abs(dateStr.split('-').reduce((a,b)=>a+parseInt(b),0)) % quotes.length;
  document.getElementById('wifeQuote').textContent=quotes[idx];
}

function getDateInfo(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  const wCh=['日','一','二','三','四','五','六'];
  const w=d.getDay();
  const isWeekend=w===0||w===6;
  const isFriday=w===5;
  const today=getTodayStr();
  let badge='';
  if(dateStr===today) badge='<span class="date-badge badge-today">今天</span>';
  else if(dateStr<today) badge='<span class="date-badge badge-past">過去</span>';
  else badge='<span class="date-badge badge-future">未來</span>';
  return{
    dateStr,day:d.getDate(),month:d.getMonth()+1,year:d.getFullYear(),
    weekdayCh:wCh[w],weekdayIdx:w,isWeekend,isFriday,
    dayType:isWeekend?'假日':isFriday?'假日前夕':'平日',
    label:`${d.getMonth()+1}／${d.getDate()} 週${wCh[w]}`,
    badge
  };
}
function delay(ms){return new Promise(r=>setTimeout(r,ms))}
function setProgress(pct,msg){
  document.getElementById('loadingBar').style.width=pct+'%';
  document.getElementById('loadingStatus').textContent=msg;
}
function showLoading(on){
  document.getElementById('loadingScreen').style.display=on?'block':'none';
  if(!on)document.getElementById('loadingBar').style.width='0%';
}
function showError(msg){
  document.getElementById('errorMsg').textContent='⚠ '+msg;
  document.getElementById('errorBox').style.display='block';
  showLoading(false);
}

// ══════════════════════════════════════════
//  API 常數
// ══════════════════════════════════════════
const API_KEY='CWA-7BD267D4-1334-4213-87AE-B87C214CC838';
const STATION_ID='466940'; // 基隆局屬氣象站（O-A0003-001用）
const RAIN_STATION_ID='C0AH20'; // 基隆雨量站（O-A0002-001用）

// ── 即時觀測（今天用）O-A0003-001 ──
async function fetchLiveObs(){
  const url=`https://opendata.cwa.gov.tw/api/v1/rest/datastore/O-A0003-001?Authorization=${API_KEY}&StationId=${STATION_ID}`;
  const res=await fetch(url);
  if(!res.ok) throw new Error('即時觀測資料抓取失敗 (HTTP '+res.status+')');
  const data=await res.json();
  const st=data?.records?.Station?.[0];
  if(!st) throw new Error('找不到基隆觀測站(466940)資料');
  
  // 抓雨量站資料 (O-A0002-001)
  let rain10=0;
  try{
    const rUrl=`https://opendata.cwa.gov.tw/api/v1/rest/datastore/O-A0002-001?Authorization=${API_KEY}&StationId=${RAIN_STATION_ID}`;
    const rRes=await fetch(rUrl);
    if(rRes.ok){
      const rData=await rRes.json();
      const rSt=rData?.records?.Station?.[0];
      rain10=parseFloat(rSt?.RainfallElement?.Now?.Precipitation)||0;
      if(rain10<0) rain10=0;
    }
  }catch(e){console.warn('RainObs failed:',e);}

  return {
    temp: parseFloat(st.WeatherElement.AirTemperature),
    windSpeed: parseFloat(st.WeatherElement.WindSpeed),
    rain10: rain10,
    time: st.ObsTime.DateTime
  };
}

// ── 逐時雨量（今天用）O-A0002-001 ──
async function fetchHourlyRain(){
  const url=`https://opendata.cwa.gov.tw/api/v1/rest/datastore/O-A0002-001?Authorization=${API_KEY}&StationId=${RAIN_STATION_ID}`;
  try{
    const res=await fetch(url);
    if(!res.ok) return null;
    const data=await res.json();
    const st=data?.records?.Station?.[0];
    if(!st) return null;
    const h=st.RainfallElement.Past24hr.Precipitation;
    // 這裡 API 回傳的是過去 24 小時每小時累積，我們簡單模擬 24 小時陣列
    const hours=[];
    const nowH=new Date().getHours();
    for(let i=0; i<24; i++){
      const val=h[i]||0;
      hours.push({h:(nowH-23+i+24)%24, mm:val<0?0:val, past:true});
    }
    return hours;
  }catch(e){return null;}
}

function renderRainChart(hours){
  if(!hours||!hours.length) return '';
  const maxMm=Math.max(...hours.map(h=>h.mm), 1);
  const bars=hours.map(h=>{
    const pct=(h.mm/maxMm)*100;
    let lv={bg:'#1A2A3A',fg:'#2A3A5A',label:'無雨'};
    if(h.mm>=40){lv={bg:'rgba(248,113,113,0.2)',fg:'#FCA5A5',label:'超大豪雨'};}
    else if(h.mm>=20){lv={bg:'rgba(251,146,60,0.2)',fg:'#FDBA74',label:'大豪雨'};}
    else if(h.mm>=10){lv={bg:'rgba(253,230,138,0.2)',fg:'#FDE68A',label:'豪雨'};}
    else if(h.mm>=4){lv={bg:'rgba(103,232,249,0.2)',fg:'#67E8F9',label:'大雨'};}
    else if(h.mm>=1){lv={bg:'rgba(96,165,250,0.2)',fg:'#60A5FA',label:'中雨'};}
    else if(h.mm>=0.5){lv={bg:'rgba(191,219,254,0.2)',fg:'#BFDBFE',label:'小雨'};}
    else if(h.mm>0){lv={bg:'rgba(147,197,253,0.1)',fg:'#93C5FD',label:'毛毛雨'};}
    
    const opacity=h.past?0.4:1;

    const mmLabel=h.mm>=0.5?`<div style="font-family:'JetBrains Mono',monospace;font-size:7px;color:${lv.fg};margin-bottom:1px;line-height:1">${h.mm.toFixed(1)}</div>`:'';

      <span style="font-family:'JetBrains Mono',monospace;font-size:8px;color:#60A5FA">▌中雨</span>

// ── 一週預報（Open-Meteo，免費無需Key，基隆座標）──
async function fetchWeekForecast(){
  const wCh=['日','一','二','三','四','五','六'];
  const LAT=25.1276, LON=121.7392;
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum&timezone=Asia%2FTaipei&forecast_days=7`;
  try{
    const res=await fetch(url);
    if(!res.ok) throw new Error('Open-Meteo HTTP '+res.status);
    const data=await res.json();
    const d=data.daily;
    if(!d||!d.time) throw new Error('no daily data');

    function wmoToWx(code){
      if(code===0) return '晴天';
      if(code<=2) return '多雲';
      if(code<=3) return '陰天';
      if(code<=48) return '霧';
      if(code<=57) return '毛毛雨';
      if(code<=67) return '小雨';
      if(code<=77) return '雪';
      if(code<=82) return '小雨';
      if(code<=86) return '大雪';
      if(code<=99) return '雷雨';
      return '多雲';
    }

    const days=d.time.map((dateStr,i)=>{
      const dt=new Date(dateStr+'T12:00:00');
      const maxT=Math.round(d.temperature_2m_max[i]);
      const minT=Math.round(d.temperature_2m_min[i]);
      const pop=d.precipitation_probability_max[i]||0;
      const rain_mm=Math.round((d.precipitation_sum[i]||0)*10)/10;
      const wxVal=wmoToWx(d.weathercode[i]);
      return{dateStr,maxT,minT,pop,rain_mm,wxVal,weekday:wCh[dt.getDay()]};
    });
    return days;
  }catch(e){
    console.warn('Open-Meteo error:',e.message);
  }
  return [];
}

async function fetchWeatherForecast(dateStr){
  const url=`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-C0032-001?Authorization=${API_KEY}&locationName=%E5%9F%BA%E9%9A%86%E5%B8%82`;
  const res=await fetch(url);
  if(!res.ok)throw new Error('天氣資料抓取失敗，請確認網路連線');
  const data=await res.json();
  const loc=data.records&&data.records.location&&data.records.location[0];
  if(!loc)throw new Error('找不到基隆天氣資料');
  const els={};
  (loc.weatherElement||[]).forEach(e=>els[e.elementName]=e.time);

  const target=new Date(dateStr+'T12:00:00+08:00');
  function findVal(times){
    if(!times||!times.length)return null;
    for(const t of times){
      const s=new Date(t.startTime);
      const e=new Date(t.endTime);
      if(target>=s&&target<e)return t.parameter&&t.parameter.parameterName;
    }
    return times[0]&&times[0].parameter&&times[0].parameter.parameterName;
  }
  function findUnit(times){
    if(!times||!times.length)return null;
    for(const t of times){
      const s=new Date(t.startTime);
      const e=new Date(t.endTime);
      if(target>=s&&target<e)return t.parameter&&t.parameter.parameterUnit;
    }
    return times[0]&&times[0].parameter&&times[0].parameter.parameterUnit;
  }

  const tMax=parseInt(findVal(els.MaxT))||28;
  const tMin=parseInt(findVal(els.MinT))||22;
  const rainProb=parseInt(findVal(els.PoP))||30;
  const wxDesc=findVal(els.Wx)||'';
  const wsDesc=findVal(els.WS)||'';

  function decodeWxDesc(desc){
    if(!desc)return{text:'多雲',emoji:'⛅',tag:'cloud'};
    if(desc.includes('雷'))return{text:'雷雨',emoji:'⛈',tag:'rain'};
    if(desc.includes('大雨')||desc.includes('豪雨'))return{text:'大雨',emoji:'🌧',tag:'rain'};
    if(desc.includes('雨'))return{text:'小雨',emoji:'🌧',tag:'rain'};
    if(desc.includes('陰'))return{text:'陰天',emoji:'🌥',tag:'cloud'};
    if(desc.includes('晴'))return{text:'晴天',emoji:'☀️',tag:'sun'};
    if(desc.includes('多雲'))return{text:'多雲',emoji:'⛅',tag:'cloud'};
    return{text:'多雲',emoji:'⛅',tag:'cloud'};
  }
  function decodeWindDesc(desc){
    if(!desc)return{text:'輕風',beaufort:2,alert:false};
    const n=parseFloat(desc);
    if(isNaN(n))return{text:'輕風',beaufort:2,alert:false};
    if(n>=8)return{text:'強風特報 '+Math.round(n)+' 級',beaufort:Math.round(n),alert:true};
    if(n>=6)return{text:'強風 6–7 級',beaufort:6,alert:false};
    if(n>=4)return{text:'4–5 級風',beaufort:4,alert:false};
    if(n>=2)return{text:'輕風',beaufort:2,alert:false};
    return{text:'無風',beaufort:0,alert:false};
  }

  const wx=decodeWxDesc(wxDesc);
  const wind=decodeWindDesc(wsDesc);
  const isRain=wx.tag==='rain';
  const rain=isRain?(rainProb>70?20:5):0;
  return{wx,wind,tMax,tMin,rain,rainProb,isRain};
}

function buildStrategy(w,di){
  const{wx,wind,tMax,tMin,rain,rainProb,isRain,rainMM}=w;
  const{label,dayType,isWeekend,isFriday,dateStr,weekdayIdx}=di;

  // ══ 2026 基隆接單規則 ══
  // 平日底線基本價 (單/雙)
  const BASE_PRICES = [
    {s: 60, d: 115}, // 0: 日
    {s: 55, d: 105}, // 1: 一
    {s: 60, d: 110}, // 2: 二
    {s: 60, d: 110}, // 3: 三
    {s: 60, d: 115}, // 4: 四
    {s: 65, d: 120}, // 5: 五
    {s: 65, d: 125}  // 6: 六
  ];
  
  // 尖峰加價策略 (中午/晚上)
  const PEAK_BONUS = [
    {l: 5, e: 5}, // 0: 日
    {l: 3, e: 5}, // 1: 一
    {l: 0, e: 3}, // 2: 二
    {l: 0, e: 3}, // 3: 三
    {l: 3, e: 5}, // 4: 四
    {l: 5, e: 5}, // 5: 五
    {l: 5, e: 5}  // 6: 六
  ];

  const base = BASE_PRICES[weekdayIdx];
  const peak = PEAK_BONUS[weekdayIdx];

  // 雨量加價規則
  const mm = (typeof rainMM === 'number' && !isNaN(rainMM)) ? rainMM : rain;
  function getRainBonus(x){
    if(x < 1.0) return 0;
    if(x < 1.5) return 3;
    if(x < 2.5) return 5;
    if(x < 3.5) return 8;
    return 10;
  }
  const rainBonus = getRainBonus(mm);

  // 計算各時段門檻
  // 規則：雨量 + 尖峰可以疊加，但總加成最多 +10
  function calcFinal(baseVal, peakVal, rainVal) {
    const totalBonus = Math.min(10, peakVal + rainVal);
    return baseVal + totalBonus;
  }

  const morningS = base.s;
  const morningD = base.d;
  const lunchS = calcFinal(base.s, peak.l, rainBonus);
  const lunchD = calcFinal(base.d, peak.l, rainBonus);
  const midS = base.s;
  const midD = base.d;
  const eveningS = calcFinal(base.s, peak.e, rainBonus);
  const eveningD = calcFinal(base.d, peak.e, rainBonus);
  const closingS = base.s;
  const closingD = base.d;

  const th={
    morning:{s:morningS, d:morningD},
    lunch:  {s:lunchS,   d:lunchD},
    mid:    {s:midS,     d:midD},
    evening:{s:eveningS, d:eveningD},
    closing:{s:closingS, d:closingD},
  };

  const isRainNow = mm >= 0.5;
  const isHeavyRainNow = mm >= 4.0;
  let wxText=wx.text, wxEmoji=wx.emoji;
  if(isRainNow){
    if(mm>=4) {wxText='大雨'; wxEmoji='🌧';}
    else if(mm>=1) {wxText='中雨'; wxEmoji='🌧';}
    else {wxText='小雨'; wxEmoji='🌦';}
  }
  const wxTag=wind.alert?'wind':isRainNow?'rain':wx.tag;

  const morningTip=isRainNow?'下雨早上不強求，先熱身 2–3 單，在仁愛區百貨附近待機。':isWeekend?'假日早上 10 點後才起量，在中正區、仁愛區待機。':'平日早上單量少，先熱身 2–3 單感覺路況。';
  const lunchTip=`${weekdayIdx===0?'週日量大易亂，注意疊單順序。':''}午餐加成時段，不達門檻不接。鎖定新豐街、義二路商圈。`;
  const midTip='下午單量緩，順路跑不強求。在仁愛區、中正住宅區待機。';
  const eveningTip='今天收入關鍵！上班族下班點餐潮，鎖定新豐街、深溪路住宅雙單。';

  const targetOrders=isWeekend?'18–22':isFriday?'16–20':'14–18';
  const targetIncome=isWeekend?'1,800–2,200':isFriday?'1,600–2,000':'1,500–1,800';
  const alertHtml=(wind.alert||isHeavyRainNow)?`<div class="alert"><div class="alert-title">⚠ 今日特別警示</div>${wind.alert?`強風特報。孝一路橋、中山高架橋上今日完全不接。`:''}${isHeavyRainNow?'大雨路面濕滑，義二路下坡積水路段減速。':''}</div>`:'';
  
  const nogoItems=[
    '等餐超過 10 分鐘 → 果斷棄單',
    `單單低於 ${th.lunch.s} → 直接跳過`,
    `雙單低於 ${th.lunch.d} → 直接跳過`,
    '距離超過 5km → 不接',
    '逆向單 → 不接'
  ];

  const lunchTag=isRainNow?'rain':wind.alert?'wind':'ok';
  const lunchTagText=isRainNow?'雨天':wind.alert?'強風':'好天';

    col3Val = mm < 0.5 ? '—' : mm.toFixed(1)+' mm';
    col3Label = mm < 0.5 ? '即時雨量' : '雨量/+加價';
    col3Color = mm < 0.5 ? '#444' : (rainBonus >= 8 ? '#F87171' : '#60A5FA');

function decodeWx(desc){
  if(!desc)return{text:'多雲',emoji:'⛅',tag:'cloud'};
  if(desc.includes('雷'))return{text:'雷雨',emoji:'⛈',tag:'rain'};
  if(desc.includes('大雨')||desc.includes('豪雨'))return{text:'大雨',emoji:'🌧',tag:'rain'};
  if(desc.includes('雨'))return{text:'小雨',emoji:'🌧',tag:'rain'};
  if(desc.includes('陰'))return{text:'陰天',emoji:'🌥',tag:'cloud'};
  if(desc.includes('晴'))return{text:'晴天',emoji:'☀️',tag:'sun'};
  if(desc.includes('多雲'))return{text:'多雲',emoji:'⛅',tag:'cloud'};
  return{text:'多雲',emoji:'⛅',tag:'cloud'};
}
function decodeWind(ms){
  if(ms>=17.2)return{text:'強風特報',beaufort:8,alert:true};
  if(ms>=10.8)return{text:'強風 6–7級',beaufort:6,alert:false};
  if(ms>=5.5) return{text:'4–5級風',beaufort:4,alert:false};
  if(ms>=1.6) return{text:'輕風',beaufort:2,alert:false};
  return{text:'無風',beaufort:0,alert:false};
}

function renderLiveBar(obs){
  const wind=decodeWind(obs.windSpeed);
  const timeStr=obs.time.substring(11,16);
  return `
  <div class="live-bar">
    <div class="live-info">
      <div class="live-dot"></div>
      <div class="live-label">LIVE OBS</div>
      <div class="live-time">${timeStr} 基隆站</div>
    </div>
    <div class="live-vals">
      <div class="live-v">${obs.temp.toFixed(1)}<span>°C</span></div>
      <div class="live-v">${obs.rain10.toFixed(1)}<span>mm</span></div>
      <div class="live-v">${wind.beaufort}<span>級風</span></div>
    </div>
  </div>`;
}

function updateLiveBarDOM(obs){
  const bar=document.querySelector('.live-bar');
  if(!bar) return;
  const wind=decodeWind(obs.windSpeed);
  const timeStr=obs.time.substring(11,16);
  bar.querySelector('.live-time').textContent=timeStr+' 基隆站';
  const vals=bar.querySelectorAll('.live-v');
  vals[0].innerHTML=obs.temp.toFixed(1)+'<span>°C</span>';
  vals[1].innerHTML=obs.rain10.toFixed(1)+'<span>mm</span>';
  vals[2].innerHTML=wind.beaufort+'<span>級風</span>';
}

function renderWeekStrip(days, selectedDate){
  const html=days.map(d=>{
    const isSel=d.dateStr===selectedDate;
    const isToday=d.dateStr===getTodayStr();
    return `<div onclick="runForDate('${d.dateStr}')" style="flex:1;padding:8px 4px;text-align:center;cursor:pointer;border-radius:4px;background:${isSel?'#1A1A1A':'transparent'};border:1px solid ${isSel?'#333':'transparent'}">
      <div style="font-size:8px;color:${isToday?'#6EE7B7':'#444'};margin-bottom:2px">${d.weekday}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:${isSel?'#DEDEDE':'#2A2A2A'}">${d.dateStr.split('-')[2]}</div>
    </div>`;
  }).join('');
  document.getElementById('weekStrip').innerHTML=`<div style="display:flex;gap:2px;background:#111;padding:4px;border-radius:6px;border:1px solid #1E1E1E">${html}</div>`;
}

function renderWeekChart(days, selectedDate){
  const maxT=Math.max(...days.map(d=>d.maxT), 1);
  const minT=Math.min(...days.map(d=>d.minT), 0);
  const range=maxT-minT||1;
  
  const cols=days.map(d=>{
    const isSel=d.dateStr===selectedDate;
    const isToday=d.dateStr===getTodayStr();
    const hMax=((d.maxT-minT)/range)*100;
    const hMin=((d.minT-minT)/range)*100;
    const wx=decodeWx(d.wxVal);
    return `
    <div class="wc-col">
      <div class="wc-bar-wrap">
        <div class="wc-bar-max" style="height:${hMax}%"></div>
        <div class="wc-bar-min" style="height:${hMin}%"></div>
      </div>
      <div class="wc-emoji">${wx.emoji}</div>
      <div class="wc-date ${isToday?'wc-today':''} ${isSel?'wc-selected':''}">${d.dateStr.split('-')[2]}</div>
    </div>`;
  }).join('');

  const tempsMax=days.map(d=>`<div class="wc-t max">${d.maxT}°</div>`).join('');
  const tempsMin=days.map(d=>`<div class="wc-t min">${d.minT}°</div>`).join('');
  const pops=days.map(d=>`<div class="wc-pop ${d.pop>=50?'high':''}">${d.pop}%</div>`).join('');

  document.getElementById('weekChart').innerHTML=`
  <div class="week-chart">
    <div class="week-chart-head"><div class="week-chart-title">7-DAY FORECAST</div></div>
    <div class="week-chart-body">
      <div class="wc-bars">${cols}</div>
      <div class="wc-temp-row">${tempsMax}</div>
      <div class="wc-temp-row" style="margin-top:0">${tempsMin}</div>
      <div class="wc-pop-row">${pops}</div>
      <div class="wc-legend">
        <div class="wc-legend-item"><div class="wc-legend-dot" style="background:#FB923C"></div>MAX</div>
        <div class="wc-legend-item"><div class="wc-legend-dot" style="background:#3B82F6"></div>MIN</div>
        <div class="wc-legend-item">% POP</div>
      </div>
    </div>
  </div>`;
}

async function runForDate(dateStr){
  document.getElementById('errorBox').style.display='none';
  document.getElementById('strategyContent').innerHTML='';
  document.getElementById('regenBtn').style.display='none';
  currentDateStr=dateStr;
  showWifeQuote(dateStr);
  if(rainRefreshTimer){clearInterval(rainRefreshTimer);rainRefreshTimer=null;}

  const today=getTodayStr();
  const di=getDateInfo(dateStr);
  const isPast=dateStr<today;
  const isFuture=dateStr>today;
  const isToday=dateStr===today;

  showLoading(true);
  document.getElementById('topSub').textContent='ANALYZING '+dateStr;

  try{
    const weekCacheKey='kl_w8_'+today;
    let weekDays=lastWeekDays;
    if(!weekDays.length){
      const wc=localStorage.getItem(weekCacheKey);
      if(wc){
        try{
          const obj=JSON.parse(wc);
          if(Date.now()-obj.t<30*60*1000 && obj.days&&obj.days.length)
            weekDays=obj.days;
          else
            localStorage.removeItem(weekCacheKey);
        }catch(e){ localStorage.removeItem(weekCacheKey); }
      }
    }
    if(!weekDays.length){
      setProgress(20,'抓取7天預報...');
      try{
        weekDays=await fetchWeekForecast();
        if(weekDays.length)
          localStorage.setItem(weekCacheKey,JSON.stringify({days:weekDays,t:Date.now()}));
        lastWeekDays=weekDays;
      }catch(e){ weekDays=[]; }
    }
    renderWeekStrip(weekDays,dateStr);
    renderWeekChart(weekDays,dateStr);

    let weather={};

    if(isToday){
      setProgress(50,'抓取即時觀測資料...');
      let obs=null;
      try{ obs=await fetchLiveObs(); }
      catch(e){ console.warn('LiveObs failed:',e.message); }

      let wind,rainMM,isRainNow,wxText,wxEmoji,wxTag;

      if(obs){
        wind=decodeWind(obs.windSpeed);
        rainMM=obs.rain10;
        isRainNow=rainMM>=0.5;
        wxText='多雲';wxEmoji='⛅';wxTag='cloud';
        if(weekDays.length){
          const todayDay=weekDays.find(d=>d.dateStr===today);
          if(todayDay){const wx=decodeWx(todayDay.wxVal);wxText=wx.text;wxEmoji=wx.emoji;wxTag=wx.tag;}
        }
        if(isRainNow){wxTag='rain';wxEmoji='🌧';wxText=rainMM>=4?'大雨':'小雨';}
        else if(wxTag==='rain'){wxTag='cloud';wxEmoji='⛅';wxText='多雲';}
      } else {
        const todayDay=weekDays.find(d=>d.dateStr===today);
        const wx=todayDay?decodeWx(todayDay.wxVal):{text:'多雲',emoji:'⛅',tag:'cloud'};
        wxText=wx.text;wxEmoji=wx.emoji;wxTag=wx.tag;
        wind={text:'—',beaufort:0,alert:false};
        rainMM=0;isRainNow=wxTag==='rain';
      }

      weather={
        wx:{text:wxText,emoji:wxEmoji,tag:wxTag},
        wind,
        tMax:obs?.temp!==null&&obs?.temp!==undefined?Math.round(obs.temp)+2:28,
        tMin:obs?.temp!==null&&obs?.temp!==undefined?Math.round(obs.temp)-2:22,
        rain:rainMM,rainProb:isRainNow?80:20,
        isRain:isRainNow,rainMM,obs:obs||null,isLiveObs:!!obs
      };

      rainRefreshTimer=setInterval(async()=>{
        try{
          const newObs=await fetchLiveObs();
          updateLiveBarDOM(newObs);
        }catch(e){}
      },10*60*1000);

    } else if(isFuture){
      setProgress(60,'抓取未來天氣預報...');
      const dayData=weekDays.find(d=>d.dateStr===dateStr);
      if(dayData&&(dayData.maxT!==null||dayData.wxVal)){
        const wx=decodeWx(dayData.wxVal);
        weather={
          wx,wind:{text:'—',beaufort:0,alert:false},
          tMax:dayData.maxT||28,tMin:dayData.minT||22,
          rainProb:dayData.pop||0,
          rainMM:dayData.rain_mm||0,
          rain:dayData.rain_mm||0,
          isRain:wx.tag==='rain',isLiveObs:false
        };
      } else {
        try{
          setProgress(70,'嘗試預報資料...');
          const fw=await fetchWeatherForecast(dateStr);
          weather={...fw,rainMM:0,isLiveObs:false};
        }catch(e){
          weather={wx:{text:'無預報資料',emoji:'❓',tag:'cloud'},wind:{text:'—',beaufort:0,alert:false},tMax:null,tMin:null,rain:0,rainProb:0,isRain:false,rainMM:0};
        }
      }
    } else {
      setProgress(90,'整理完成...');
      await delay(200);
      showLoading(false);
      document.getElementById('topTitle').innerHTML=`${di.label}${di.badge}<br>接單策略`;
      document.getElementById('strategyContent').innerHTML=`
        <div style="padding:24px 0;text-align:center;font-family:'JetBrains Mono',monospace;">
          <div style="font-size:32px;margin-bottom:12px">📅</div>
          <div style="font-size:12px;color:#444;line-height:1.8">過去日期無即時資料<br><br><span style="color:#2A2A2A">請選擇今天或未來日期</span></div>
        </div>`;
      return;
    }

    setProgress(90,'計算接單門檻...');
    await delay(200);
    const liveBarHtml=isToday&&weather.obs?renderLiveBar(weather.obs):'';
    let rainChartHtml='';
    if(isToday){
      try{
        const hourlyRain=await fetchHourlyRain();
        rainChartHtml=hourlyRain?renderRainChart(hourlyRain):'';
      }catch(e){}
    }
    const html=liveBarHtml+rainChartHtml+buildStrategy(weather,di);
    renderOutput(html,di);

  }catch(e){
    showError(e.message||'發生錯誤');
  }
}

function runDate(){
  const val=document.getElementById('datePicker').value;
  if(!val) return;
  runForDate(val);
}

function goToday(){
  const today=getTodayStr();
  document.getElementById('datePicker').value=today;
  runForDate(today);
}

function regen(){
  if(!currentDateStr) return;
  lastWeekDays=[];
  localStorage.removeItem('kl_w8_'+getTodayStr());
  runForDate(currentDateStr);
}

const SLOT_META = [
  {emoji:'🌅', time:'09:00–11:00', name:'開局段'},
  {emoji:'🍱', time:'11:00–13:30', name:'午餐段'},
  {emoji:'☀️', time:'13:30–17:00', name:'過渡段'},
  {emoji:'🌙', time:'17:00–20:30', name:'主戰場'},
];
let activeSlot = 0;

function selectSlot(idx){
  activeSlot = idx;
  document.querySelectorAll('.save-slot').forEach((el,i)=>{
    el.classList.toggle('active', i===idx);
  });
}

async function saveSlotImage(){
  const btn = document.getElementById('saveBtn');
  const blocks = document.querySelectorAll('#strategyContent .block');
  if(!blocks.length){ alert('請先載入策略'); return; }
  const block = blocks[activeSlot];
  if(!block){ alert('找不到此時段'); return; }

  btn.disabled = true;
  btn.textContent = '處理中...';

  try {
    const canvas = await html2canvas(block, {
      backgroundColor: '#0F0F0F',
      scale: 2,
      logging: false
    });
    const link = document.createElement('a');
    link.download = `基隆外送策略_${currentDateStr}_${SLOT_META[activeSlot].name}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (e) {
    alert('圖片生成失敗');
  }

  btn.disabled = false;
  btn.textContent = 'GENERATE & SAVE IMAGE';
}

  const today = getTodayStr();

  runForDate(today);
