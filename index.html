<title>基隆外送策略</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=JetBrains+Mono:wght@500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0F0F0F;color:#F0F0F0;font-family:'Noto Sans TC',sans-serif;min-height:100vh;padding:28px 16px 56px;display:flex;justify-content:center}
.card{width:100%;max-width:380px}
.top{margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #1E1E1E}
.top-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;color:#444;margin-bottom:8px}
.top-title{font-size:26px;font-weight:900;line-height:1.1;margin-bottom:6px}
.top-sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:#444}
.wife-note{margin-bottom:18px;padding:11px 14px;background:linear-gradient(135deg,rgba(110,231,183,0.07) 0%,rgba(167,139,250,0.07) 100%);border:1px solid #1E1E1E;border-left:3px solid #6EE7B7;border-radius:4px;position:relative;}
.wife-tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:#6EE7B7;opacity:0.7;margin-bottom:5px}
.wife-text{font-size:13px;line-height:1.7;color:#D4FAE8;font-weight:700}
.wife-sig{font-family:'JetBrains Mono',monospace;font-size:9px;color:#444;margin-top:5px;text-align:right}
.date-picker{margin-bottom:18px;display:flex;align-items:center;gap:8px;background:#141414;border:1px solid #1E1E1E;border-radius:6px;padding:10px 12px;}
.date-picker label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:#444;flex-shrink:0}
.date-picker input[type="date"]{flex:1;background:transparent;border:none;color:#DEDEDE;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;outline:none;cursor:pointer;-webkit-appearance:none;}
.date-picker input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.4);cursor:pointer}
.date-go-btn{padding:5px 10px;background:#1A2A1A;border:1px solid rgba(110,231,183,0.2);border-radius:3px;color:#6EE7B7;font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:1px;flex-shrink:0;white-space:nowrap;}
.date-go-btn:hover{background:#1F3A1F;border-color:rgba(110,231,183,0.4)}
.date-today-btn{padding:5px 8px;background:#141414;border:1px solid #222;border-radius:3px;color:#444;font-family:'JetBrains Mono',monospace;font-size:9px;cursor:pointer;flex-shrink:0;}
.date-today-btn:hover{color:#666;border-color:#333}
.loading-screen{padding:48px 0;text-align:center}
.loading-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;color:#2A2A2A;margin-bottom:20px}
.loading-bar-wrap{width:100%;height:1px;background:#1A1A1A;margin-bottom:14px}
.loading-bar{height:100%;width:0%;background:#6EE7B7;transition:width 0.6s ease}
.loading-status{font-family:'JetBrains Mono',monospace;font-size:11px;color:#2A2A2A}
.error-box{background:#1A0A0A;border:1px solid #3A1A1A;border-left:3px solid #F87171;border-radius:4px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#F87171;line-height:1.6;margin-bottom:12px}
.retry-btn{width:100%;margin-top:10px;padding:9px;background:#1A0A0A;border:1px solid #3A1A1A;border-radius:4px;color:#F87171;font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:1px}
.weather-bar{background:#161616;border:1px solid #222;border-radius:6px;padding:10px 12px;display:grid;grid-template-columns:1fr 1fr 1fr;margin-bottom:18px}
.w-item{text-align:center}
.w-item+.w-item{border-left:1px solid #222}
.w-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:#60A5FA;margin-bottom:2px}
.w-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:#444;letter-spacing:1px}
.alert{background:#1A0F0F;border:1px solid #4A1E1E;border-left:3px solid #F87171;border-radius:4px;padding:10px 12px;margin-bottom:18px;font-size:12px;font-family:'JetBrains Mono',monospace;color:#F87171;line-height:1.6}

.block{padding:16px 0;border-bottom:1px solid #1E1E1E}
.time-row{display:flex;align-items:baseline;gap:8px;margin-bottom:12px}
.time-emoji{font-size:15px;flex-shrink:0}
.time-range{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700}
.time-name{font-family:'JetBrains Mono',monospace;font-size:11px;color:#444;margin-left:6px}
.cond-tag{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;border-radius:2px;letter-spacing:1px;margin-left:auto;flex-shrink:0}
.tag-rain{background:rgba(96,165,250,0.12);color:#60A5FA;border:1px solid rgba(96,165,250,0.2)}
.tag-wind{background:rgba(248,113,113,0.12);color:#F87171;border:1px solid rgba(248,113,113,0.2)}
.tag-cloud{background:rgba(156,163,175,0.12);color:#9CA3AF;border:1px solid rgba(156,163,175,0.2)}
.tag-ok{background:rgba(52,211,153,0.10);color:#6EE7B7;border:1px solid rgba(52,211,153,0.2)}
.tag-sun{background:rgba(253,224,71,0.10);color:#FDE047;border:1px solid rgba(253,224,71,0.2)}
.price-line{display:flex;align-items:baseline;margin-bottom:5px;padding-left:23px}
.price-type{font-family:'JetBrains Mono',monospace;font-size:12px;color:#555;width:28px;flex-shrink:0}
.price-gte{font-family:'JetBrains Mono',monospace;font-size:12px;color:#333;width:16px;flex-shrink:0}

.price-unit{font-family:'JetBrains Mono',monospace;font-size:10px;color:#444;margin-left:3px;padding-bottom:3px;align-self:flex-end}

.tip{padding-left:23px;margin-top:8px}

.tip-inner.blue{background:#0A1020;color:#93C5FD;border-left:2px solid #1A3A7A}

/* ── 七天天氣圖 ── */
.week-chart{margin-bottom:18px;background:#111;border:1px solid #1E1E1E;border-radius:8px;overflow:hidden}
.week-chart-head{padding:8px 12px;background:#141414;border-bottom:1px solid #1E1E1E;display:flex;justify-content:space-between;align-items:center}
.week-chart-title{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;color:#444}
.week-chart-body{padding:12px 10px 8px}
.wc-bars{display:flex;gap:4px;align-items:flex-end;height:70px;margin-bottom:6px}
.wc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.wc-bar-wrap{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;flex:1}
.wc-bar-max{width:60%;border-radius:2px 2px 0 0;background:linear-gradient(180deg,#FB923C,#F59E0B);min-height:4px;transition:height 0.4s}
.wc-bar-min{width:60%;border-radius:0 0 2px 2px;background:linear-gradient(180deg,#3B82F6,#60A5FA);min-height:4px;transition:height 0.4s}

.wc-date{font-family:'JetBrains Mono',monospace;font-size:8px;color:#444;text-align:center;white-space:nowrap}
.wc-date.wc-today{color:#6EE7B7}
.wc-date.wc-selected{color:#A78BFA}
.wc-temp-row{display:flex;gap:4px;margin-top:4px}
.wc-t{font-family:'JetBrains Mono',monospace;font-size:9px;text-align:center;flex:1}
.wc-t.max{color:#FB923C}
.wc-t.min{color:#60A5FA}
.wc-pop-row{display:flex;gap:4px;margin-top:2px}
.wc-pop{font-family:'JetBrains Mono',monospace;font-size:8px;color:#444;text-align:center;flex:1}

.wc-legend{display:flex;gap:12px;padding:6px 2px 0;border-top:1px solid #1A1A1A;margin-top:4px}
.wc-legend-item{display:flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:8px;color:#444}

/* ── 存圖片 ── */
.save-box{margin-top:16px;background:#111;border:1px solid #1E1E1E;border-radius:6px;overflow:hidden}
.save-box-head{padding:9px 12px;background:#141414;border-bottom:1px solid #1E1E1E;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;color:#444}
.save-slots{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 12px}
.save-slot{padding:8px 6px;background:#0F0F0F;border:1px solid #1E1E1E;border-radius:4px;cursor:pointer;text-align:center;transition:border-color 0.15s,background 0.15s}
.save-slot:hover{background:#161616;border-color:#333}
.save-slot.active{background:#0A1A10;border-color:rgba(110,231,183,0.4)}
.save-slot-time{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:#555;margin-bottom:2px}
.save-slot.active .save-slot-time{color:#6EE7B7}
.save-slot-name{font-family:'JetBrains Mono',monospace;font-size:8px;color:#2A2A2A}
.save-slot.active .save-slot-name{color:#3A7A55}
.save-btn{display:block;width:calc(100% - 24px);margin:0 12px 12px;padding:10px;background:#1A2A1A;border:1px solid rgba(110,231,183,0.2);border-radius:4px;color:#6EE7B7;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;cursor:pointer;text-align:center}
.save-btn:hover{background:#1F3A1F;border-color:rgba(110,231,183,0.4)}

.live-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:#6EE7B7;font-weight:700}
.live-time{font-family:'JetBrains Mono',monospace;font-size:9px;color:#444;margin-left:auto}
.live-vals{display:flex;gap:10px;margin-left:12px}
.live-v{font-family:'JetBrains Mono',monospace;font-size:11px;color:#DEDEDE;font-weight:700}

/* ── 雨量圖 ── */
.rain-chart{margin-bottom:18px;background:#111;border:1px solid #1E1E1E;border-radius:8px;overflow:hidden}
.rain-chart-head{padding:8px 12px;background:#141414;border-bottom:1px solid #1E1E1E;display:flex;justify-content:space-between;align-items:center}
.rain-chart-title{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;color:#444}

.rc-bars{display:flex;gap:3px;align-items:flex-end;height:50px;margin-bottom:6px}
.rc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.rc-bar{width:100%;background:linear-gradient(180deg,rgba(96,165,250,0.4),rgba(96,165,250,0.1));border-radius:1px 1px 0 0;min-height:1px;transition:height 0.4s}
.rc-bar.active{background:linear-gradient(180deg,#60A5FA,#3B82F6)}
.rc-time{font-family:'JetBrains Mono',monospace;font-size:7px;color:#333;transform:scale(0.9)}

.rc-val{font-family:'JetBrains Mono',monospace;font-size:7px;color:#222;margin-bottom:1px}

.today-dot{display:inline-block;width:8px;height:8px;background:#6EE7B7;border-radius:50%;margin-right:10px;vertical-align:middle;box-shadow:0 0 10px rgba(110,231,183,0.3)}

.badge-today{background:rgba(110,231,183,0.1);color:#6EE7B7;border:1px solid rgba(110,231,183,0.2)}
.badge-past{background:rgba(68,68,68,0.1);color:#444;border:1px solid rgba(68,68,68,0.2)}

@media (max-width:360px){
  body{padding:20px 12px 40px}

</style>

<body>

<div class="card" id="captureArea">
  <div class="top">
    <div class="top-label">KEELUNG DELIVERY STRATEGY</div>
    <h1 class="top-title" id="topTitle">基隆外送<br>每日策略</h1>
    <div class="top-sub" id="topSub">LOADING DATA...</div>
  </div>

  <div class="wife-note">
    <div class="wife-tag">MESSAGE FROM WIFE</div>
    <div class="wife-text" id="wifeQuote">老公加油！騎車小心，平安回家最重要 ❤️</div>
    <div class="wife-sig">— YOUR LOVING WIFE</div>
  </div>

  <div class="date-picker">
    <label>DATE</label>
    <input type="date" id="datePicker" onchange="runDate()">
    <button class="date-today-btn" onclick="goToday()">TODAY</button>
    <button class="date-go-btn" onclick="runDate()">GO</button>
  </div>

  <div id="weekStrip"></div>
  <div id="weekChart"></div>

  <div id="loadingScreen" class="loading-screen">
    <div class="loading-label">ANALYZING WEATHER & MARKET</div>
    <div class="loading-bar-wrap"><div id="loadingBar" class="loading-bar"></div></div>
    <div id="loadingStatus" class="loading-status">初始化中...</div>
  </div>

  <div id="errorBox" class="error-box" style="display:none"></div>

  <div id="strategyContent"></div>

  <div class="save-box" id="saveBox" style="display:none">

        <div class="save-slot-time">09:00–11:00</div>

      </div>
      <div class="save-slot" onclick="selectSlot(1)">
        <div class="save-slot-time">11:00–13:30</div>
        <div class="save-slot-name">午餐段</div>
      </div>
      <div class="save-slot" onclick="selectSlot(2)">
        <div class="save-slot-time">13:30–17:00</div>
        <div class="save-slot-name">過渡段</div>
      </div>
      <div class="save-slot" onclick="selectSlot(3)">
        <div class="save-slot-time">17:00–20:30</div>
        <div class="save-slot-name">主戰場</div>
      </div>
    </div>
    <button class="save-btn" id="saveBtn" onclick="saveSlotImage()">SAVE TO GALLERY</button>
  </div>

  <div class="footer">
    KL-DELIVERY-V2.5 // 2024
  </div>
</div>

<script>
const API_KEY='7783309a-0740-4963-9964-88484643099c';

function getTodayStr(){
  const now=new Date();
  const y=now.getFullYear();
  const m=String(now.getMonth()+1).padStart(2,'0');
  const d=String(now.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function getDateInfo(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  const wCh=['日','一','二','三','四','五','六'];
  const w=d.getDay();
  const isWeekend=w===0||w===6;
  const isFriday=w===5;
  const today=getTodayStr();
  let badge='';
  if(dateStr===today) badge='<span class="date-badge badge-today">今天</span>';
  else if(dateStr<today) badge='<span class="date-badge badge-past">過去</span>';
  else badge='<span class="date-badge badge-future">未來</span>';
  return{
    dateStr,day:d.getDate(),month:d.getMonth()+1,year:d.getFullYear(),
    weekdayCh:wCh[w],weekdayIdx:w,isWeekend,isFriday,
    dayType:isWeekend?'假日':isFriday?'假日前夕':'平日',
    label:`${d.getMonth()+1}／${d.getDate()} 週${wCh[w]}`,
    badge
  };
}

function delay(ms){return new Promise(r=>setTimeout(r,ms))}
function setProgress(pct,msg){
  document.getElementById('loadingBar').style.width=pct+'%';
  document.getElementById('loadingStatus').textContent=msg;
}
function showLoading(on){
  document.getElementById('loadingScreen').style.display=on?'block':'none';
  if(!on)document.getElementById('loadingBar').style.width='0%';
}
function showError(msg){
  const b=document.getElementById('errorBox');
  b.style.display='block';
  b.innerHTML=`ERROR: ${msg}<br><button class="retry-btn" onclick="regen()">RETRY</button>`;
  showLoading(false);
}

const QUOTES = [
  "老公加油！騎車小心，平安回家最重要 ❤️",
  "今天基隆風大，過橋要抓穩龍頭喔 🌪️",
  "下雨了，雨衣穿好別感冒，我在家等你 🌧️",
  "累了就休息一下，喝口水再出發 🥤",
  "你是家裡的英雄，但安全永遠是第一名 🏆",
  "今天單量好像不錯，但別太拼命喔 💰",
  "基隆坡多路滑，轉彎要慢一點 🛵",
  "老公辛苦了！今晚煮你愛吃的 🍲",
  "看到外送箱就想到你在努力，愛你喔 🤟",
  "不管今天跑多少，平安回來就是滿分 💯"
];
function showWifeQuote(dateStr){
  const seed = dateStr.split('-').reduce((a,b)=>a+parseInt(b),0);
  document.getElementById('wifeQuote').textContent = QUOTES[seed % QUOTES.length];
}

// ── 抓取即時觀測 O-A0002-001 ──
async function fetchLiveObs(){
  const url=`https://opendata.cwa.gov.tw/api/v1/rest/datastore/O-A0002-001?Authorization=${API_KEY}&stationId=466940`;
  const res=await fetch(url);
  if(!res.ok)throw new Error('觀測資料抓取失敗');
  const data=await res.json();
  const st=data.records&&data.records.Station&&data.records.Station[0];
  if(!st)throw new Error('找不到基隆觀測站');
  const obsTime=st.ObsTime.DateTime;
  const temp=st.WeatherElement.AirTemperature;
  const windSpeed=st.WeatherElement.WindSpeed;
  const rain10=st.WeatherElement.Now.Precipitation;
  const rain24=st.WeatherElement.DailyPrecipitation.Precipitation;
  return {obsTime,temp,windSpeed,rain10,rain24};
}

async function fetchHourlyRain(){

// ── 今明36小時預報（非今天的日期用）F-C0032-001 ──
async function fetchWeatherForecast(dateStr){
  const url=`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-C0032-001?Authorization=${API_KEY}&locationName=%E5%9F%BA%E9%9A%86%E5%B8%82`;
  const res=await fetch(url);
  if(!res.ok)throw new Error('天氣資料抓取失敗，請確認網路連線');
  const data=await res.json();
  const loc=data.records&&data.records.location&&data.records.location[0];
  if(!loc)throw new Error('找不到基隆天氣資料');
  const els={};
  (loc.weatherElement||[]).forEach(e=>els[e.elementName]=e.time);

  const target=new Date(dateStr+'T12:00:00+08:00');
  function findVal(times){
    if(!times||!times.length)return null;
    for(const t of times){
      const s=new Date(t.startTime);
      const e=new Date(t.endTime);
      if(target>=s&&target<e)return t.parameter&&t.parameter.parameterName;
    }
    return times[0]&&times[0].parameter&&times[0].parameter.parameterName;
  }
  function findUnit(times){
    if(!times||!times.length)return null;
    for(const t of times){
      const s=new Date(t.startTime);
      const e=new Date(t.endTime);
      if(target>=s&&target<e)return t.parameter&&t.parameter.parameterUnit;
    }
    return times[0]&&times[0].parameter&&times[0].parameter.parameterUnit;
  }

  const tMax=parseInt(findVal(els.MaxT))||28;
  const tMin=parseInt(findVal(els.MinT))||22;
  const rainProb=parseInt(findVal(els.PoP))||30;
  const wxDesc=findVal(els.Wx)||'';
  const wsDesc=findVal(els.WS)||'';
  const wdDesc=findUnit(els.WS)||'';

  function decodeWxDesc(desc){
    if(!desc)return{text:'多雲',emoji:'⛅',tag:'cloud'};
    if(desc.includes('雷'))return{text:'雷雨',emoji:'⛈',tag:'rain'};
    if(desc.includes('大雨')||desc.includes('豪雨'))return{text:'大雨',emoji:'🌧',tag:'rain'};
    if(desc.includes('雨'))return{text:'小雨',emoji:'🌧',tag:'rain'};
    if(desc.includes('陰'))return{text:'陰天',emoji:'🌥',tag:'cloud'};
    if(desc.includes('晴'))return{text:'晴天',emoji:'☀️',tag:'sun'};
    if(desc.includes('多雲'))return{text:'多雲',emoji:'⛅',tag:'cloud'};
    return{text:'多雲',emoji:'⛅',tag:'cloud'};
  }
  function decodeWindDesc(desc){
    if(!desc)return{text:'輕風',beaufort:2,alert:false};
    const n=parseFloat(desc);
    if(isNaN(n))return{text:'輕風',beaufort:2,alert:false};
    if(n>=8)return{text:'強風特報 '+Math.round(n)+' 級',beaufort:Math.round(n),alert:true};
    if(n>=6)return{text:'強風 6–7 級',beaufort:6,alert:false};
    if(n>=4)return{text:'4–5 級風',beaufort:4,alert:false};
    if(n>=2)return{text:'輕風',beaufort:2,alert:false};
    return{text:'無風',beaufort:0,alert:false};
  }

  const wx=decodeWxDesc(wxDesc);
  const wind=decodeWindDesc(wsDesc);
  const isRain=wx.tag==='rain';
  const rain=isRain?(rainProb>70?20:5):0;
  const isHeavyRain=isRain&&rain>15;
  const isBothBad=isRain&&wind.alert;
  const windKmh=wind.beaufort*3.6*2;
  return{wx,wind,tMax,tMin,windKmh,rain,rainProb,isRain,isHeavyRain,isBothBad};
}

function buildStrategy(w,di){
  const{wx,wind,tMax,tMin,rain,rainProb,isRain,isHeavyRain,rainMM}=w;
  const{label,dayType,isWeekend,isFriday,isHoliday,dateStr,weekdayIdx}=di;

  // ══ 台灣連假清單 ══
  const HOLIDAYS=[
    '01-01','02-28','04-04','04-05','05-01','06-06',
    '09-28','10-10','12-25',
    // 農曆春節區間（固定西曆近似）
    '01-27','01-28','01-29','01-30','01-31','02-01','02-02',
  ];
  const mmdd = dateStr ? dateStr.slice(5) : '';
  const isNationalHoliday = HOLIDAYS.includes(mmdd);
  const isLongHoliday = isNationalHoliday || (isWeekend && isFriday);

  // ══ 天氣分類 ══
  const mm = (typeof rainMM === 'number' && !isNaN(rainMM)) ? rainMM : rain;
  const isRainNow = mm >= 0.5;
  const isSunny = !isRainNow;
  const isHeavyRainNow = mm >= 4.0;

  // 🌧 雨量加價規則 (新)
  function getRainBonus(x){
    if(x < 1.0)  return 0;
    if(x < 1.5)  return 3;
    if(x < 2.5)  return 5;
    if(x < 3.5)  return 8;
    return 10; // 3.5 mm 以上
  }

  function getRainStrategy(x){
    if(x < 1.0)  return '正常跑，注意路滑';
    if(x < 1.5)  return '微挑單，補貼雨天費';
    if(x < 2.5)  return '挑短單，維持流動';
    if(x < 3.5)  return '保守跑，不空等';
    return '安全第一，視情況休息';
  }

  const rainBonus = isSunny ? 0 : getRainBonus(mm);
  const rainStrategy = isSunny ? '' : getRainStrategy(mm);

  // 📅 基隆平日接單底線基本價 (新)
  // 0:日, 1:一, 2:二, 3:三, 4:四, 5:五, 6:六
  const BASE_RULES = [
    {s:60, d:115}, // 日
    {s:55, d:105}, // 一
    {s:60, d:110}, // 二
    {s:60, d:110}, // 三
    {s:60, d:115}, // 四
    {s:65, d:120}, // 五
    {s:65, d:125}  // 六
  ];
  
  const baseRule = BASE_RULES[weekdayIdx];
  let baseS = baseRule.s;
  let baseD = baseRule.d;

  // 尖峰加價策略 (新)
  const PEAK_BONUS = [
    {lunch:3, evening:5}, // 日
    {lunch:3, evening:5}, // 一
    {lunch:0, evening:3}, // 二
    {lunch:0, evening:3}, // 三
    {lunch:3, evening:5}, // 四
    {lunch:5, evening:5}, // 五
    {lunch:5, evening:5}  // 六
  ];
  const peak = PEAK_BONUS[weekdayIdx];

  function calcFinal(base, peakAdd, rainAdd) {
    let totalAdd = peakAdd + rainAdd;
    if (totalAdd > 10) totalAdd = 10; // 總加成最多 +10
    return base + totalAdd;
  }

  const th={
    morning:{s:baseS, d:baseD},
    lunch:  {s:calcFinal(baseS, peak.lunch, rainBonus), d:calcFinal(baseD, peak.lunch, rainBonus)},
    mid:    {s:baseS, d:baseD},
    evening:{s:calcFinal(baseS, peak.evening, rainBonus), d:calcFinal(baseD, peak.evening, rainBonus)},
    closing:{s:baseS, d:baseD},
  };

  // mm 數優先覆蓋天氣描述
  let wxText=wx.text, wxEmoji=wx.emoji;
  if(isRainNow){
    if(mm>=40) {wxText='超大豪雨';wxEmoji='⛈';}
    else if(mm>=20){wxText='大豪雨'; wxEmoji='⛈';}
    else if(mm>=10){wxText='豪雨';   wxEmoji='🌧';}
    else if(mm>=4) {wxText='大雨';   wxEmoji='🌧';}
    else if(mm>=1) {wxText='中雨';   wxEmoji='🌧';}
    else if(mm>=0.5){wxText='小雨';  wxEmoji='🌦';}
    else           {wxText='毛毛雨'; wxEmoji='🌦';}
  }
  const wxTag=wind.alert?'wind':isRainNow?'rain':wx.tag;
  const morningTip=isHeavyRainNow?'大雨天早上單量少，先熱身 2 單。中正路下坡、義二路路面濕滑，減速慢行。':wind.alert?'強風天早上先測風向，孝一路橋段小心側風，感覺路況再決定是否加速。':isRainNow?'下雨早上不強求，先熱身 2–3 單，在仁愛區百貨附近待機單量穩定。':isWeekend?'假日早上 10 點後才起量，在中正區、仁愛區待機，等單不要亂跑。':'平日早上單量少，先熱身 2–3 單感覺路況，在仁愛區或崇仁市場附近待機。';
  const lunchTip=isHeavyRainNow?'大雨午餐是今天最好賺時段！雨衣全套穿好，鎖定新豐街、信一路餐廳密集區衝量。':wind.alert?'強風午餐只接平地單，山路橋上全不接。鎖定仁愛區、中正區，目標 4–5 單。':isRainNow?'雨天午餐加成時段，不達門檻不接。專注新豐街、義二路商圈，拼 5–6 單。':isWeekend?'假日午餐爆量！鎖定新豐街、仁一路餐廳，雙單優先，目標 6–8 單。':'平日午餐衝量，不達門檻不接。在新豐街、義二路待機，目標 5–6 單。';

function decodeWx(desc){

  if(desc.includes('雨'))return{text:'小雨',emoji:'🌧',tag:'rain'};
  if(desc.includes('陰'))return{text:'陰天',emoji:'🌥',tag:'cloud'};
  if(desc.includes('晴'))return{text:'晴天',emoji:'☀️',tag:'sun'};
  if(desc.includes('多雲'))return{text:'多雲',emoji:'⛅',tag:'cloud'};
  return{text:'多雲',emoji:'⛅',tag:'cloud'};
}
function decodeWind(ms){
  if(ms>=17.2)return{text:'強風特報',beaufort:8,alert:true};
  if(ms>=10.8)return{text:'強風 6–7級',beaufort:6,alert:false};
  if(ms>=5.5) return{text:'4–5級風',beaufort:4,alert:false};
  if(ms>=1.6) return{text:'輕風',beaufort:2,alert:false};
  return{text:'無風',beaufort:0,alert:false};
}

function renderWeekStrip(days,selectedDate){
  const wrap=document.getElementById('weekStrip');
  if(!days.length){wrap.innerHTML='';return;}
  let h='<div style="display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px">';
  days.forEach(d=>{
    const isSel=d.dateStr===selectedDate;
    const isToday=d.dateStr===getTodayStr();
    const wx=decodeWx(d.wxVal);
    h+=`<div onclick="runForDate('${d.dateStr}')" style="flex:1;min-width:42px;padding:8px 0;background:${isSel?'#1A1A1A':'#111'};border:1px solid ${isSel?'#A78BFA':isToday?'#6EE7B7':'#1E1E1E'};border-radius:4px;text-align:center;cursor:pointer">
      <div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:${isSel?'#A78BFA':isToday?'#6EE7B7':'#444'};margin-bottom:4px">${d.weekday}</div>
      <div style="font-size:14px;margin-bottom:2px">${wx.emoji}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:${isSel?'#DEDEDE':'#333'}">${d.maxT}°</div>
    </div>`;
  });
  h+='</div>';
  wrap.innerHTML=h;
}

function renderWeekChart(days,selectedDate){
  const wrap=document.getElementById('weekChart');
  if(!days.length){wrap.innerHTML='';return;}
  const maxAll=Math.max(...days.map(d=>d.maxT));
  const minAll=Math.min(...days.map(d=>d.minT));
  const range=maxAll-minAll||1;
  let h=`<div class="week-chart">
    <div class="week-chart-head"><div class="week-chart-title">7-DAY FORECAST</div></div>
    <div class="week-chart-body">
      <div class="wc-bars">`;
  days.forEach(d=>{
    const isSel=d.dateStr===selectedDate;
    const hMax=((d.maxT-minAll)/range)*40+20;
    const hMin=((d.minT-minAll)/range)*40+10;
    h+=`<div class="wc-col">
      <div class="wc-bar-wrap">
        <div class="wc-bar-max" style="height:${hMax}px;opacity:${isSel?1:0.4}"></div>
        <div class="wc-bar-min" style="height:${hMin}px;opacity:${isSel?1:0.4}"></div>
      </div>
      <div class="wc-emoji">${decodeWx(d.wxVal).emoji}</div>
      <div class="wc-date ${d.dateStr===getTodayStr()?'wc-today':''} ${isSel?'wc-selected':''}">${d.dateStr.slice(8)}</div>
    </div>`;
  });
  h+=`</div><div class="wc-legend">
    <div class="wc-legend-item"><div class="wc-legend-dot" style="background:#FB923C"></div>MAX</div>
    <div class="wc-legend-item"><div class="wc-legend-dot" style="background:#3B82F6"></div>MIN</div>
  </div></div></div>`;
  wrap.innerHTML=h;
}

function renderLiveBar(obs){
  const t=new Date(obs.obsTime);
  const timeStr=String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0');
  return `<div class="live-bar">
    <div class="live-dot"></div>
    <div class="live-label">LIVE</div>
    <div class="live-vals">
      <div class="live-v"><span>TEMP</span>${Math.round(obs.temp)}°</div>
      <div class="live-v"><span>RAIN</span>${obs.rain10.toFixed(1)}</div>
      <div class="live-v"><span>WIND</span>${obs.windSpeed.toFixed(1)}</div>
    </div>
    <div class="live-time">UPDATED ${timeStr}</div>
  </div>`;
}

function updateLiveBarDOM(obs){
  const bar=document.querySelector('.live-bar');
  if(!bar)return;
  const t=new Date(obs.obsTime);
  const timeStr=String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0');
  bar.querySelector('.live-time').textContent=`UPDATED ${timeStr}`;
  const vs=bar.querySelectorAll('.live-v');
  vs[0].innerHTML=`<span>TEMP</span>${Math.round(obs.temp)}°`;
  vs[1].innerHTML=`<span>RAIN</span>${obs.rain10.toFixed(1)}`;
  vs[2].innerHTML=`<span>WIND</span>${obs.windSpeed.toFixed(1)}`;
}

function renderRainChart(data){
  let h=`<div class="rain-chart">
    <div class="rain-chart-head"><div class="rain-chart-title">HOURLY PRECIPITATION</div></div>
    <div class="rain-chart-body"><div class="rc-bars">`;
  const maxV=Math.max(...data.map(d=>d.v),1);
  data.forEach((d,i)=>{
    const isLast=i===data.length-1;
    const hh=Math.max(2,(d.v/maxV)*40);
    h+=`<div class="rc-col">
      <div class="rc-val ${isLast?'active':''}">${d.v.toFixed(1)}</div>
      <div class="rc-bar ${isLast?'active':''}" style="height:${hh}px"></div>
      <div class="rc-time ${isLast?'active':''}">${String(d.h).padStart(2,'0')}</div>
    </div>`;
  });
  h+=`</div></div></div>`;
  return h;
}

async function runForDate(dateStr){
  document.getElementById('errorBox').style.display='none';
  document.getElementById('strategyContent').innerHTML='';
  document.getElementById('regenBtn').style.display='none';
  currentDateStr=dateStr;
  showWifeQuote(dateStr);
  if(rainRefreshTimer){clearInterval(rainRefreshTimer);rainRefreshTimer=null;}

  const today=getTodayStr();
  const di=getDateInfo(dateStr);
  const isPast=dateStr<today;
  const isFuture=dateStr>today;
  const isToday=dateStr===today;

  showLoading(true);

  try{
    const weekCacheKey='kl_w8_'+today;
    let weekDays=lastWeekDays;
    if(!weekDays.length){
      const wc=localStorage.getItem(weekCacheKey);
      if(wc){
        try{
          const obj=JSON.parse(wc);
          if(Date.now()-obj.t<30*60*1000 && obj.days&&obj.days.length)
            weekDays=obj.days;
          else
            localStorage.removeItem(weekCacheKey);
        }catch(e){ localStorage.removeItem(weekCacheKey); }
      }
    }
    if(!weekDays.length){
      setProgress(20,'抓取7天預報...');
      try{
        weekDays=await fetchWeekForecast();
        if(weekDays.length)
          localStorage.setItem(weekCacheKey,JSON.stringify({days:weekDays,t:Date.now()}));
        lastWeekDays=weekDays;
      }catch(e){ weekDays=[]; }
    }
    renderWeekStrip(weekDays,dateStr);
    renderWeekChart(weekDays,dateStr);

    let weather={};

    if(isToday){
      setProgress(50,'抓取即時觀測資料...');
      let obs=null;
      try{ obs=await fetchLiveObs(); }
      catch(e){ console.warn('LiveObs failed, using forecast fallback:',e.message); }

      let wind,rainMM,isRainNow,wxText,wxEmoji,wxTag;

      if(obs){
        wind=decodeWind(obs.windSpeed);
        rainMM=obs.rain10;
        isRainNow=rainMM>=0.5;
        wxText='多雲';wxEmoji='⛅';wxTag='cloud';
        if(weekDays.length){
          const todayDay=weekDays.find(d=>d.dateStr===today);
          if(todayDay){const wx=decodeWx(todayDay.wxVal);wxText=wx.text;wxEmoji=wx.emoji;wxTag=wx.tag;}
        }
        if(isRainNow){wxTag='rain';wxEmoji='🌧';wxText=rainMM>=4?'大雨':'小雨';}
        else if(wxTag==='rain'){wxTag='cloud';wxEmoji='⛅';wxText='多雲';}
      } else {
        const todayDay=weekDays.find(d=>d.dateStr===today);
        const wx=todayDay?decodeWx(todayDay.wxVal):{text:'多雲',emoji:'⛅',tag:'cloud'};
        wxText=wx.text;wxEmoji=wx.emoji;wxTag=wx.tag;
        wind={text:'—',beaufort:0,alert:false};
        rainMM=0;isRainNow=wxTag==='rain';
      }

      weather={
        wx:{text:wxText,emoji:wxEmoji,tag:wxTag},
        wind,
        tMax:obs?.temp!==null&&obs?.temp!==undefined?Math.round(obs.temp)+2:28,
        tMin:obs?.temp!==null&&obs?.temp!==undefined?Math.round(obs.temp)-2:22,
        rain:rainMM,rainProb:isRainNow?80:20,
        isRain:isRainNow,isHeavyRain:rainMM>=4,
        rainMM,obs:obs||null,isLiveObs:!!obs
      };

      rainRefreshTimer=setInterval(async()=>{
        try{
          const newObs=await fetchLiveObs();
          const newRain=newObs.rain10;
          const newWind=decodeWind(newObs.windSpeed);
          const newIsRain=newRain>=0.5;
          let nwxText=wxText,nwxEmoji=wxEmoji,nwxTag=wxTag;
          if(newIsRain){nwxTag='rain';nwxEmoji='🌧';nwxText=newRain>=4?'大雨':'小雨';}
          else{if(nwxTag==='rain'){nwxTag='cloud';nwxEmoji='⛅';nwxText='多雲';}}
          updateLiveBarDOM(newObs);
          const rainChanged=Math.abs(newRain-weather.rain)>=0.5||newIsRain!==weather.isRain;
          const windChanged=newWind.alert!==weather.wind.alert;
          if(rainChanged||windChanged){
            const newW={...weather,wx:{text:nwxText,emoji:nwxEmoji,tag:nwxTag},wind:newWind,rain:newRain,rainMM:newRain,isRain:newIsRain,isHeavyRain:newRain>=4,obs:newObs};
            const newHtml=renderLiveBar(newObs)+buildStrategy(newW,di);
            document.getElementById('strategyContent').innerHTML=newHtml;
            Object.assign(weather,newW);
          }
        }catch(e){}
      },10*60*1000);

    } else if(isFuture){
      setProgress(60,'抓取未來天氣預報...');
      const dayData=weekDays.find(d=>d.dateStr===dateStr);
      if(dayData&&(dayData.maxT!==null||dayData.wxVal)){
        const wx=decodeWx(dayData.wxVal);
        const isRain=wx.tag==='rain';
        weather={
          wx,wind:{text:'—',beaufort:0,alert:false},
          tMax:dayData.maxT||28,tMin:dayData.minT||22,
          rainProb:dayData.pop||0,
          rainMM:typeof dayData.rain_mm==='number'?dayData.rain_mm:
            (dayData.pop>=90?5:dayData.pop>=70?2:dayData.pop>=50?0.8:dayData.pop>=30?0.3:0),
          rain:typeof dayData.rain_mm==='number'?dayData.rain_mm:
            (dayData.pop>=90?5:dayData.pop>=70?2:dayData.pop>=50?0.8:dayData.pop>=30?0.3:0),
          isRain,isHeavyRain:(dayData.rain_mm||0)>=4,isLiveObs:false
        };
      } else {
        try{
          setProgress(70,'嘗試預報資料...');
          const fw=await fetchWeatherForecast(dateStr);
          weather={...fw,rainMM:0,isLiveObs:false};
        }catch(e){
          weather={wx:{text:'無預報資料',emoji:'❓',tag:'cloud'},wind:{text:'—',beaufort:0,alert:false},tMax:null,tMin:null,rain:0,rainProb:0,isRain:false,isHeavyRain:false,rainMM:0};
        }
      }
    } else {
      setProgress(90,'整理完成...');
      await delay(200);
      showLoading(false);
      const badge=di.badge||'';
      document.getElementById('topTitle').innerHTML=`${di.label}${badge}<br>接單策略`;
      document.getElementById('strategyContent').innerHTML=`
        <div style="padding:24px 0;text-align:center;font-family:'JetBrains Mono',monospace;">
          <div style="font-size:32px;margin-bottom:12px">📅</div>
          <div style="font-size:12px;color:#444;line-height:1.8">過去日期無即時資料<br>氣象署不開放歷史天氣<br><br><span style="color:#2A2A2A">請選擇今天或未來日期</span></div>
        </div>`;
      document.getElementById('regenBtn').style.display='none';
      return;
    }

    setProgress(90,'計算接單門檻...');
    await delay(200);
    const liveBarHtml=isToday&&weather.obs?renderLiveBar(weather.obs):'';
    let rainChartHtml='';
    if(isToday){
      try{
        const hourlyRain=await fetchHourlyRain();
        rainChartHtml=hourlyRain?renderRainChart(hourlyRain):'';
      }catch(e){}
    }
    const html=liveBarHtml+rainChartHtml+buildStrategy(weather,di);
    renderOutput(html,di);

  }catch(e){
    showError(e.message||'發生錯誤，請稍後再試');
  }
}

function runDate(){
  const val=document.getElementById('datePicker').value;
  if(!val) return;
  runForDate(val);
}

function goToday(){
  const today=getTodayStr();
  document.getElementById('datePicker').value=today;
  runForDate(today);
}

function regen(){
  if(!currentDateStr) return;
  lastWeekDays=[];
  localStorage.removeItem('kl_w8_'+getTodayStr());
  if(rainRefreshTimer){clearInterval(rainRefreshTimer);rainRefreshTimer=null;}
  document.getElementById('strategyContent').innerHTML='';
  document.getElementById('regenBtn').style.display='none';
  document.getElementById('topTitle').innerHTML='基隆外送<br>每日策略';
  runForDate(currentDateStr);
}

async function saveSlotImage(){

  const weatherBar = document.querySelector('.weather-bar');
  const weatherText = weatherBar ? weatherBar.innerText.replace(/\n/g,' · ').trim() : '';

  const priceLines = block.querySelectorAll('.price-line');
  let singleVal='', doubleVal='', priceColor='#DEDEDE';
  priceLines.forEach((pl,i)=>{
    const val = pl.querySelector('.price-val');
    if(!val) return;
    if(i===0){
      singleVal = val.innerText.trim();
      priceColor = val.className.includes('c-orange')?'#FB923C'
        :val.className.includes('c-blue')?'#60A5FA'
        :val.className.includes('c-red')?'#F87171'
        :val.className.includes('c-purple')?'#A78BFA':'#DEDEDE';

    if(i===1) doubleVal = val.innerText.trim();
  });

  const tipEl = block.querySelector('.tip-inner');

    if(tipEl.classList.contains('red')){ tipBg='#1A0A0A';tipBorder='#F87171';tipColor='#F87171'; }

    else if(tipEl.classList.contains('green')){ tipBg='#0A1A10';tipBorder='#6EE7B7';tipColor='#6EE7B7'; }

        </div>
      </div>

        <div style="font-size:32px;font-weight:900;color:#DEDEDE;margin-bottom:8px">${dateLabel}</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:18px;color:#444;letter-spacing:2px">${weatherText}</div>
      </div>
    </div>
    <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:0 70px;gap:60px;">
      <div style="flex:1;background:#141414;border:1px solid #222;border-radius:24px;padding:40px;display:flex;flex-direction:column;gap:30px;">
        <div style="display:flex;align-items:baseline;gap:20px;">
