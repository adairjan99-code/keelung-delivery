<body>

<div class="card">

  </div>

  <!-- 老婆加油語錄 -->

    <div class="wife-tag">💌 老婆說</div>

  </div>

  <!-- 日期選擇器 -->

    <button class="date-today-btn" onclick="goToday()">今天</button>

  <div id="loadingScreen" style="display:none">
    <div class="loading-label">LOADING STRATEGY</div>
    <div class="loading-bar-wrap"><div class="loading-bar" id="loadingBar"></div></div>

  <!-- 存圖片區塊 -->

  </div>
  <canvas id="snapCanvas"></canvas>

</div>

<script>
const CACHE_PREFIX='kl_v7_';

// ══════════════════════════════════════════
//  老婆語錄
// ══════════════════════════════════════════
// ══════════════════════════════════════════
const WIFE_QUOTES=[
  '今天辛苦了，每一單都是我們的未來，加油！',

  '我在家等你，好好賺，平安最重要！',
  '今天也是為家人打拼的一天，你是我的英雄！',
  '喝水了嗎？記得補充體力，你是最強外送員！',
  '再累也要笑，笑著回家才是勝利，加油加油！',
  '你出門我就放心了，因為你是最可靠的人！',
  '今天的疲倦換來明天的美好，繼續衝！',
  '路上遇到難纏的單就算了，好單自然來，加油！',
  '你跑得越穩，我心裡越踏實，平安就是一切！',
  '不管今天怎樣，回家有熱飯等你，加油寶貝！',
  '每一滴汗都值得，因為你在為我們打拼！',
  '今天一定是好日子，好單多多，平安回家！',
  '外面的世界再複雜，回家這裡永遠有你的位置！',
  '加油加油再加油，你是我最勇敢的人！',
  '天氣好好跑，天氣差保重身體，我愛你！',
  '你每次出門我都默默為你加油，感覺到了嗎？',
  '辛苦是暫時的，我們的好日子越來越近了！',
  '不管賺多賺少，平安回來就是最好的收穫！',
  '你是最棒的外送員，也是最好的老公，衝吧！',
  '早餐有沒有吃？身體是本錢，保重最重要！',
  '今天的每一單，都讓我們離夢想更近一步！',
  '你跑在路上，我的心就跟著你，加油！',
  '累了就休息一下，不用拼命，穩穩賺就好！',
];

function getQuoteForDate(dateStr){
  let seed=0;
  for(let i=0;i<dateStr.length;i++) seed+=dateStr.charCodeAt(i)*(i+1);
  const yesterday=getYesterdayStr(dateStr);
  let yIdx=-1;
  if(yesterday){
    let ySeed=0;
    for(let i=0;i<yesterday.length;i++) ySeed+=yesterday.charCodeAt(i)*(i+1);
    yIdx=ySeed % WIFE_QUOTES.length;
  }
  let idx=seed % WIFE_QUOTES.length;
  if(idx===yIdx) idx=(idx+1) % WIFE_QUOTES.length;
  return WIFE_QUOTES[idx];
}

function getYesterdayStr(dateStr){
  try{
    const d=new Date(dateStr+'T12:00:00');
    d.setDate(d.getDate()-1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }catch(e){return null;}
}

function showWifeQuote(dateStr){
  document.getElementById('wifeQuote').textContent=getQuoteForDate(dateStr);
}

function getTodayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getDateInfo(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  const wCh=['日','一','二','三','四','五','六'];
  const w=d.getDay();
  const isWeekend=w===0||w===6;
  const isFriday=w===5;
  const today=getTodayStr();
  let badge='';
  if(dateStr===today) badge='<span class="date-badge badge-today">今天</span>';
  else if(dateStr<today) badge='<span class="date-badge badge-past">過去</span>';
  else badge='<span class="date-badge badge-future">未來</span>';
  return{
    dateStr,day:d.getDate(),month:d.getMonth()+1,year:d.getFullYear(),
    weekdayCh:wCh[w],isWeekend,isFriday,
    dayType:isWeekend?'假日':isFriday?'假日前夕':'平日',
    label:`${d.getMonth()+1}／${d.getDate()} 週${wCh[w]}`,
    badge
  };
}
function delay(ms){return new Promise(r=>setTimeout(r,ms))}
function setProgress(pct,msg){
  document.getElementById('loadingBar').style.width=pct+'%';
  document.getElementById('loadingStatus').textContent=msg;
}
function showLoading(on){
  document.getElementById('loadingScreen').style.display=on?'block':'none';
  if(!on)document.getElementById('loadingBar').style.width='0%';
}
function showError(msg){
  document.getElementById('errorMsg').textContent='⚠ '+msg;
  document.getElementById('errorBox').style.display='block';
  showLoading(false);
}

async function fetchWeatherForecast(dateStr){
  const API_KEY='CWA-7BD267D4-1334-4213-87AE-B87C214CC838';
  // F-C0032-001: 今明36小時天氣預報，locationName填縣市名
  const url='https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-C0032-001?Authorization='+API_KEY+'&locationName=%E5%9F%BA%E9%9A%86%E5%B8%82';
  const res=await fetch(url);
  if(!res.ok)throw new Error('天氣資料抓取失敗，請確認網路連線');
  const data=await res.json();
  const loc=data.records&&data.records.location&&data.records.location[0];
  if(!loc)throw new Error('找不到基隆天氣資料');
  const els={};
  (loc.weatherElement||[]).forEach(e=>els[e.elementName]=e.time);

  // 找對應日期時段（每8小時一筆，共3筆）
  const target=new Date(dateStr+'T12:00:00+08:00');
  function findVal(times){
    if(!times||!times.length)return null;
    for(const t of times){
      const s=new Date(t.startTime);
      const e=new Date(t.endTime);
      if(target>=s&&target<e)return t.parameter&&t.parameter.parameterName;
    }
    return times[0]&&times[0].parameter&&times[0].parameter.parameterName;
  }
  function findUnit(times){
    if(!times||!times.length)return null;
    for(const t of times){
      const s=new Date(t.startTime);
      const e=new Date(t.endTime);
      if(target>=s&&target<e)return t.parameter&&t.parameter.parameterUnit;
    }
    return times[0]&&times[0].parameter&&times[0].parameter.parameterUnit;
  }

  const tMax=parseInt(findVal(els.MaxT))||28;
  const tMin=parseInt(findVal(els.MinT))||22;
  const rainProb=parseInt(findVal(els.PoP))||30;
  const wxDesc=findVal(els.Wx)||'';
  const wsDesc=findVal(els.WS)||'';
  const wdDesc=findUnit(els.WS)||'';

  function decodeWxDesc(desc){
    if(!desc)return{text:'多雲',emoji:'⛅',tag:'cloud'};
    if(desc.includes('雷'))return{text:'雷雨',emoji:'⛈',tag:'rain'};
    if(desc.includes('大雨')||desc.includes('豪雨'))return{text:'大雨',emoji:'🌧',tag:'rain'};
    if(desc.includes('雨'))return{text:'小雨',emoji:'🌧',tag:'rain'};
    if(desc.includes('陰'))return{text:'陰天',emoji:'🌥',tag:'cloud'};
    if(desc.includes('晴'))return{text:'晴天',emoji:'☀️',tag:'sun'};
    if(desc.includes('多雲'))return{text:'多雲',emoji:'⛅',tag:'cloud'};
    return{text:'多雲',emoji:'⛅',tag:'cloud'};
  }
  function decodeWindDesc(desc){
    if(!desc)return{text:'輕風',beaufort:2,alert:false};
    const n=parseFloat(desc);
    if(isNaN(n))return{text:'輕風',beaufort:2,alert:false};
    if(n>=8)return{text:'強風特報 '+Math.round(n)+' 級',beaufort:Math.round(n),alert:true};
    if(n>=6)return{text:'強風 6–7 級',beaufort:6,alert:false};
    if(n>=4)return{text:'4–5 級風',beaufort:4,alert:false};
    if(n>=2)return{text:'輕風',beaufort:2,alert:false};
    return{text:'無風',beaufort:0,alert:false};
  }

  const wx=decodeWxDesc(wxDesc);
  const wind=decodeWindDesc(wsDesc);
  const isRain=wx.tag==='rain';
  const rain=isRain?(rainProb>70?20:5):0;
  const isHeavyRain=isRain&&rain>15;
  const isBothBad=isRain&&wind.alert;
  const windKmh=wind.beaufort*3.6*2;
  return{wx,wind,tMax,tMin,windKmh,rain,rainProb,isRain,isHeavyRain,isBothBad};
}

function buildStrategy(w,di){
  const{wx,wind,tMax,tMin,rain,rainProb,isRain,isHeavyRain,rainMM}=w;
  const{label,dayType,isWeekend,isFriday,isHoliday,dateStr}=di;

  // ══ 台灣連假清單 ══
  const HOLIDAYS=[
    '01-01','02-28','04-04','04-05','05-01','06-06',
    '09-28','10-10','12-25',
    // 農曆春節區間（固定西曆近似）
    '01-27','01-28','01-29','01-30','01-31','02-01','02-02',
  ];
  const mmdd = dateStr ? dateStr.slice(5) : '';
  const isNationalHoliday = HOLIDAYS.includes(mmdd);
  const isLongHoliday = isNationalHoliday || (isWeekend && isFriday);

  // ══ 天氣分類 ══
  // 即時雨量優先：rainMM >= 0.5 才算下雨，避免預報說雨但實際沒下
  const mm = (typeof rainMM === 'number' && !isNaN(rainMM)) ? rainMM : rain;
  const isRainNow = mm >= 0.5;
  const isSunny = !isRainNow;
  const isHeavyRainNow = mm >= 4.0;

  function getRainBonus(x){
    if(x < 0.5)  return 0;
    if(x < 1.0)  return 5;
    if(x < 1.5)  return 10;
    if(x < 2.0)  return 15;
    if(x < 2.5)  return 20;
    if(x < 3.0)  return 25;
    if(x < 3.5)  return 30;
    if(x < 4.0)  return 35;
    return 45; // 4.0mm 以上豪雨
  }

  function getRainStrategy(x){
    if(x < 0.5)  return '完全不挑，正常跑';
    if(x < 1.0)  return '幾乎不挑，補一點雨天費';
    if(x < 1.5)  return '微挑單，但不能等';
    if(x < 2.0)  return '有補償，以接單率為主';
    if(x < 2.5)  return '可稍微挑距離';
    if(x < 4.0)  return '挑短單，維持流動';
    return '保守跑，不空等';
  }

  const rainBonus = isSunny ? 0 : getRainBonus(mm);
  const rainStrategy = isSunny ? '' : getRainStrategy(mm);
  const sunnyS = 50, sunnyD = 110;
  let baseS, baseD;

  function r5(n){ return Math.round(n/5)*5; }

  if(isLongHoliday || isWeekend){
    // 假日／連假同一標準
    baseS = r5(sunnyS + (isSunny ? 10 : 10 + rainBonus));
    baseD = r5(sunnyD + (isSunny ? 20 : 20 + rainBonus));
  } else {
    // 平日
    baseS = r5(sunnyS + (isSunny ? 5 : 5 + rainBonus));
    baseD = r5(sunnyD + (isSunny ? 5 : 5 + rainBonus));
  }

  // ══ 各時段門檻 ══
  // 尖峰時段（午餐＋晚餐）額外 +5
  const PEAK = 5;
  const morningS = r5(baseS);
  const morningD = r5(baseD);
  const closingS = r5(baseS);
  const closingD = r5(baseD);
  // 過渡：基準 -5
  const midS = r5(baseS - 5);
  const midD = r5(baseD - 5);
  // 午餐/主戰場：基準 +5（尖峰加成）
  const lunchS = r5(baseS + PEAK);
  const lunchD = r5(baseD + PEAK);
  const eveningS = r5(baseS + PEAK);
  const eveningD = r5(baseD + PEAK);

  const th={
    morning:{s:morningS, d:morningD},
    lunch:  {s:lunchS,   d:lunchD},
    mid:    {s:midS,     d:midD},
    evening:{s:eveningS, d:eveningD},
    closing:{s:closingS, d:closingD},
  };
  const wxTag=wind.alert?'wind':isRainNow?'rain':wx.tag;
  const morningTip=isHeavyRainNow?'大雨天早上單量少，先熱身 2 單。中正路下坡、義二路路面濕滑，減速慢行。':wind.alert?'強風天早上先測風向，孝一路橋段小心側風，感覺路況再決定是否加速。':isRainNow?'下雨早上不強求，先熱身 2–3 單，在仁愛區百貨附近待機單量穩定。':isWeekend?'假日早上 10 點後才起量，在中正區、仁愛區待機，等單不要亂跑。':'平日早上單量少，先熱身 2–3 單感覺路況，在仁愛區或崇仁市場附近待機。';
  const lunchTip=isHeavyRainNow?'大雨午餐是今天最好賺時段！雨衣全套穿好，鎖定新豐街、信一路餐廳密集區衝量。':wind.alert?'強風午餐只接平地單，山路橋上全不接。鎖定仁愛區、中正區，目標 4–5 單。':isRainNow?'雨天午餐加成時段，不達門檻不接。專注新豐街、義二路商圈，拼 5–6 單。':isWeekend?'假日午餐爆量！鎖定新豐街、仁一路餐廳，雙單優先，目標 6–8 單。':'平日午餐衝量，不達門檻不接。在新豐街、義二路待機，目標 5–6 單。';
  const midTip=wind.alert?'過渡段風大，在中正區、仁愛住宅區待機，20 分鐘無單換崇仁市場附近。':isRainNow?'下午單量緩，順路跑不強求。在仁愛區、中正住宅區待機，20 分鐘無單換區。':isWeekend?'假日下午仍有單，在新豐街、義二路商圈待機，順路跑不強求遠距離。':'平日下午單少，在仁愛區、中正住宅區待機，20 分鐘無單換崇仁市場附近。';
  const eveningTip=isHeavyRainNow?'今天收入關鍵！大雨晚餐單量爆發，雨衣全套穿好。鎖定新豐街、深溪路住宅，雙單優先，目標 6–8 單。':wind.alert?'強風晚餐只接平地單。鎖定新豐街、信一路，上班族下班餐潮，目標 5–6 單。':isRainNow?'今天收入關鍵！雨天晚餐加成，鎖定新豐街、深溪路住宅雙單，目標 6–7 單。':isWeekend?'今天收入關鍵！假日晚餐最旺，鎖定新豐街、義二路、中正區，雙單優先，目標 8–10 單。':'今天收入關鍵！上班族下班點餐潮，鎖定新豐街、深溪路住宅雙單，目標 6–8 單。';
  const targetOrders=isWeekend?'18–22':isFriday?'16–20':'14–18';
  const targetIncome=isWeekend?'1,800–2,200':isFriday?'1,600–2,000':'1,500–1,800';
  const alertHtml=(wind.alert||isHeavyRainNow)?`<div class="alert"><div class="alert-title">⚠ 今日特別警示</div>${wind.alert?`強風特報，陣風 ${wind.beaufort} 級。孝一路橋、中山高架橋上今日完全不接。`:''}${isHeavyRainNow?'大雨路面濕滑，義二路下坡積水路段減速。視線差時主動靠邊暫停。':''}${wind.alert&&!isHeavyRainNow?'雨衣備好，視線差時主動靠邊暫停。':''}</div>`:'';
  const nogoItems=[];
  if(wind.alert)nogoItems.push('山路單、橋上單 → 強風特報，全天不接');
  nogoItems.push('等餐超過 10 分鐘 → 果斷棄單');
  nogoItems.push(`單單低於 ${th.lunch.s} → 直接跳過`);
  nogoItems.push(`雙單低於 ${th.lunch.d} → 直接跳過`);
  if(isHeavyRainNow)nogoItems.push('能見度差時主動暫停 → 安全第一');
  nogoItems.push('距離超過 5km → 不接');
  nogoItems.push('逆向單 → 不接');
  const lunchTag=isRainNow?'rain':wind.alert?'wind':'ok';
  const lunchTagText=isRainNow?'雨天':wind.alert?'強風':'好天';
  const midTagText=wind.alert?'仍有風':isRainNow?'仍有雨':'順跑';
  const midTag=wind.alert?'wind':isRainNow?'rain':'ok';
  const rainMmDisplay = isSunny ? '—' : mm.toFixed(1)+' mm';
  const rainBonusDisplay = isSunny ? '' : `（+${rainBonus}元）`;
  const rainColor = rainBonus >= 35 ? '#F87171' : rainBonus >= 20 ? '#FB923C' : rainBonus >= 10 ? '#60A5FA' : '#9CA3AF';
  const wxDesc=`${wx.emoji} ${wx.text} ${tMin}–${tMax}°C${wind.alert?'，'+wind.text:''}${isRainNow?`，即時雨量 ${mm.toFixed(1)}mm${rainBonusDisplay}`:''}`;
  const dayChar=isWeekend?'假日單量旺，晚餐是重頭戲':isFriday?'週五下班潮早，晚餐搶先卡位':'平日早午單少，晚餐上班族下班是關鍵';
  return `
  <div class="weather-bar">
    <div class="w-item"><div class="w-val">${wx.emoji} ${wx.text}</div><div class="w-label">全天天氣</div></div>
    <div class="w-item"><div class="w-val">${tMin}–${tMax}°</div><div class="w-label">氣溫</div></div>
    <div class="w-item"><div class="w-val" style="color:${isSunny?'#60A5FA':rainColor}">${rainMmDisplay}${rainBonus>0?' +'+rainBonus:''}</div><div class="w-label">${isSunny?'風況':'即時雨量/加價'}</div></div>
  </div>
  ${isSunny?'':`<div style="background:#0A1020;border:1px solid rgba(96,165,250,0.15);border-left:3px solid rgba(96,165,250,0.4);border-radius:4px;padding:8px 12px;margin-bottom:14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#93C5FD;line-height:1.6">🌧 即時雨量 <b>${mm.toFixed(1)} mm</b> → 加價 <b>+${rainBonus}元</b>｜策略：${rainStrategy}</div>`}
  ${alertHtml}

    <div class="price-line"><div class="price-type">單</div><div class="price-gte">≥</div><div class="price-val c-white">${th.morning.s}</div><div class="price-unit">元</div></div>
    <div class="price-line"><div class="price-type">雙</div><div class="price-gte">≥</div><div class="price-val c-white">${th.morning.d}</div><div class="price-unit">元</div></div>

let currentDateStr='';
let rainRefreshTimer=null;

// 只快取預報（不含雨量），雨量每次重抓
async function fetchRainOnly(){
  const API_KEY='CWA-7BD267D4-1334-4213-87AE-B87C214CC838';
  try{
    const rwUrl='https://opendata.cwa.gov.tw/api/v1/rest/datastore/O-A0002-001?Authorization='+API_KEY+'&StationId=C0AH20&WeatherElement=Now';
    const rw=await fetch(rwUrl);
    if(!rw.ok) return 0;
    const rj=await rw.json();
    const station=rj?.records?.Station;
    if(station&&station.length){
      const val=station[0]?.WeatherElement?.Now?.Precipitation;
      if(val!==undefined&&val!==null&&!isNaN(parseFloat(val))) return parseFloat(val);
    }
  }catch(e){}
  return 0;
}

async function runForDate(dateStr){
  document.getElementById('errorBox').style.display='none';
  document.getElementById('strategyContent').innerHTML='';
  document.getElementById('regenBtn').style.display='none';
  currentDateStr=dateStr;
  showWifeQuote(dateStr);

  // 清除舊的自動更新
  if(rainRefreshTimer){ clearInterval(rainRefreshTimer); rainRefreshTimer=null; }

  // 預報快取（只存今天以外的日期，今天的也只快取預報部分）
  const cacheKey=CACHE_PREFIX+dateStr;
  const today=getTodayStr();
  let forecastData=null;

  const cached=localStorage.getItem(cacheKey);
  if(cached){
    try{
      const obj=JSON.parse(cached);
      // 有 forecastData 才用（新格式），舊格式 html 直接清掉
      if(obj.forecastData) forecastData=obj.forecastData;
      else localStorage.removeItem(cacheKey);
    }catch(e){ localStorage.removeItem(cacheKey); }
  }

  showLoading(true);
  try{
    if(!forecastData){
      setProgress(30,'正在抓取基隆天氣預報...');
      forecastData=await fetchWeatherForecast(dateStr);
      // 只有非今天才長期快取，今天快取30分鐘
      localStorage.setItem(cacheKey,JSON.stringify({forecastData, savedAt: Date.now()}));
    }

    setProgress(60,'正在抓取即時雨量...');
    const rainMM = dateStr===today ? await fetchRainOnly() : 0;
    const weather={...forecastData, rainMM};

    const di=getDateInfo(dateStr);
    setProgress(90,'計算接單門檻...');
    await delay(300);
    const html=buildStrategy(weather,di);
    renderOutput(html,di);

    // 今天的話，每10分鐘自動重抓雨量
    if(dateStr===today){
      rainRefreshTimer=setInterval(async()=>{
        const newRain=await fetchRainOnly();
        const newWeather={...forecastData, rainMM:newRain};
        const newHtml=buildStrategy(newWeather,di);
        document.getElementById('strategyContent').innerHTML=newHtml;
      }, 10*60*1000);
    }

  }catch(e){
    showError(e.message||'發生錯誤，請稍後再試');
  }
}

function runDate(){
  const val=document.getElementById('datePicker').value;
  if(!val) return;
  runForDate(val);
}

function goToday(){
  const today=getTodayStr();
  document.getElementById('datePicker').value=today;
  runForDate(today);
}

function regen(){
  if(!currentDateStr) return;
  localStorage.removeItem(CACHE_PREFIX+currentDateStr);
  if(rainRefreshTimer){ clearInterval(rainRefreshTimer); rainRefreshTimer=null; }
  document.getElementById('strategyContent').innerHTML='';
  document.getElementById('regenBtn').style.display='none';
  document.getElementById('topTitle').innerHTML='基隆外送<br>每日策略';
  runForDate(currentDateStr);
}

  let tipBg='#141414', tipBorder='#555', tipColor='#CCCCCC';
  if(tipEl){
    if(tipEl.classList.contains('red')){ tipBg='#1A0A0A';tipBorder='#F87171';tipColor='#F87171'; }
    else if(tipEl.classList.contains('blue')){ tipBg='#0A1020';tipBorder='#60A5FA';tipColor='#93C5FD'; }
    else if(tipEl.classList.contains('green')){ tipBg='#0A1A10';tipBorder='#6EE7B7';tipColor='#6EE7B7'; }
  }

  const W = 1280, H = 720;
  const wrap = document.createElement('div');
  wrap.style.cssText = `
    position:fixed;left:-9999px;top:0;
    width:${W}px;height:${H}px;
    background:#0F0F0F;
    font-family:'Noto Sans TC',sans-serif;
    display:flex;flex-direction:column;
    box-sizing:border-box;
    overflow:hidden;
  `;

  wrap.innerHTML = `
    <!-- 頂部：時段 + 日期 + 天氣 -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:44px 70px 0;flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:24px;">
        <span style="font-size:80px;line-height:1">${meta.emoji}</span>
        <div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:68px;font-weight:700;color:#FFFFFF;line-height:1">${meta.time}</div>
          <div style="font-size:32px;font-weight:700;color:#FFFFFF;margin-top:6px;letter-spacing:3px">${meta.name}</div>
        </div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:36px;font-weight:700;color:#FFFFFF;">${dateLabel}</div>
        <div style="font-size:26px;color:#FFFFFF;margin-top:10px;opacity:0.75">${weatherText}</div>
      </div>
    </div>

    <!-- 中間：單 / 雙 大數字 -->
    <div style="flex:1;display:flex;align-items:center;justify-content:center;gap:60px;padding:0 70px;">
      <div style="text-align:center;flex:1;">
        <div style="font-size:44px;font-weight:700;color:#FFFFFF;letter-spacing:6px;margin-bottom:8px;">單</div>
        <div style="font-size:210px;font-weight:900;line-height:0.85;color:${priceColor};letter-spacing:-6px;">${singleVal}</div>
        <div style="font-size:34px;font-weight:700;color:#FFFFFF;margin-top:14px;">元以上</div>
      </div>
      <div style="width:2px;height:280px;background:#555;flex-shrink:0;"></div>
      <div style="text-align:center;flex:1;">
        <div style="font-size:44px;font-weight:700;color:#FFFFFF;letter-spacing:6px;margin-bottom:8px;">雙</div>
        <div style="font-size:210px;font-weight:900;line-height:0.85;color:${priceColor};letter-spacing:-6px;">${doubleVal}</div>
        <div style="font-size:34px;font-weight:700;color:#FFFFFF;margin-top:14px;">元以上</div>
      </div>
    </div>

    <!-- 底部：路況提示 -->
    <div style="padding:0 70px 44px;flex-shrink:0;">
      <div style="background:${tipBg};border-left:6px solid ${tipBorder};border-radius:4px;padding:24px 34px;font-size:28px;line-height:1.6;color:#FFFFFF;font-weight:700;">${tipText}</div>
    </div>
  `;

  document.body.appendChild(wrap);

  try {
    const canvas = await html2canvas(wrap, {
      width: W, height: H,
      scale: 1,
      useCORS: true,
      backgroundColor: '#0F0F0F',
      logging: false,
    });
    const link = document.createElement('a');
    const slotLabel = meta.time.replace(':','').replace('–','-').replace(':','');
    link.download = `基隆外送_${slotLabel}_${currentDateStr||'today'}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('截圖失敗：' + e.message);
  }

  document.body.removeChild(wrap);
  btn.disabled = false;
  btn.textContent = '⬇ 儲存此時段圖片';
}

window.addEventListener('DOMContentLoaded',()=>{
  const today=getTodayStr();
  document.getElementById('datePicker').value=today;
  showWifeQuote(today);
  runForDate(today);
});
</script>
</body>
</html>
